# Manifest of runnable examples — one entry per directory under examples/.
#
# Fields:
#   id:       directory name under examples/ (e.g. 02-hello-syscall)
#   langs:    languages implemented; subset of [cpp, go, rust]
#   mode:     local    — build and run on the host
#             vm       — run the built binary inside a lab VM (TARGET set)
#             vm-peer  — needs two lab VMs talking to each other
#   requires: optional prerequisites, e.g. [lgtm] for the observability stack
#   timeout:  per-language verification budget in seconds
examples:
  - id: _template
    langs: [cpp, go, rust]
    mode: local
    timeout: 180
  - id: 01-hello-syscalls
    langs: [cpp, go, rust]
    mode: local
    timeout: 180
  - id: 04-syscalls-and-the-abi
    langs: [cpp, go, rust]
    mode: local
    timeout: 180
  - id: 05-errors-three-ways
    langs: [cpp, go, rust]
    mode: local
    timeout: 180
  - id: 06-concurrency-three-ways
    langs: [cpp, go, rust]
    mode: local
    timeout: 240
  - id: 07-fds-raii-and-the-vfs
    langs: [cpp, go, rust]
    mode: local
    timeout: 180
  - id: 08-page-cache-and-durability
    langs: [cpp, go, rust]
    mode: local
    timeout: 300
  - id: 09-event-loops-epoll-inotify
    langs: [cpp, go, rust]
    mode: local
    timeout: 240
  - id: 10-io-uring
    langs: [cpp, go, rust]
    mode: local
    timeout: 300
