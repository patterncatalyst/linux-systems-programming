<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 470" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="20" y="44" width="840" height="150" rx="12" fill="#fafafa" stroke="#ddd"/>
<text x="32" y="64" font-size="12" font-weight="700" fill="#1d1d1d">The clocks clock_gettime(clk_id, ...) can read</text>
<rect x="20" y="214" width="840" height="236" rx="12" fill="#fafafa" stroke="#ddd"/>
<text x="32" y="234" font-size="12" font-weight="700" fill="#1d1d1d">Why a heartbeat deadline MUST read a monotonic clock</text>
<rect x="35" y="76" width="190" height="96" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="130.0" y="107.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">CLOCK_REALTIME</text>
<text x="130.0" y="124.0" font-size="11.5" fill="#555555" text-anchor="middle">wall time / UTC</text>
<text x="130.0" y="139.0" font-size="11.5" fill="#555555" text-anchor="middle">settable + NTP-slewed</text>
<text x="130.0" y="154.0" font-size="11.5" fill="#555555" text-anchor="middle">CAN STEP backward</text>
<rect x="240" y="76" width="190" height="96" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="335.0" y="107.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">CLOCK_MONOTONIC</text>
<text x="335.0" y="124.0" font-size="11.5" fill="#555555" text-anchor="middle">since a boot epoch</text>
<text x="335.0" y="139.0" font-size="11.5" fill="#555555" text-anchor="middle">never steps, never back</text>
<text x="335.0" y="154.0" font-size="11.5" fill="#555555" text-anchor="middle">steady_clock / Instant</text>
<rect x="445" y="76" width="190" height="96" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="540.0" y="114.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">CLOCK_BOOTTIME</text>
<text x="540.0" y="131.5" font-size="11.5" fill="#555555" text-anchor="middle">monotonic, and also</text>
<text x="540.0" y="146.5" font-size="11.5" fill="#555555" text-anchor="middle">counts suspend time</text>
<rect x="650" y="76" width="190" height="96" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="745.0" y="114.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">PROCESS_CPUTIME_ID</text>
<text x="745.0" y="131.5" font-size="11.5" fill="#555555" text-anchor="middle">this process&#x27;s</text>
<text x="745.0" y="146.5" font-size="11.5" fill="#555555" text-anchor="middle">on-CPU time only</text>
<rect x="60" y="300" width="350" height="132" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="235.0" y="341.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">deadline = wall_now() + timeout</text>
<text x="235.0" y="358.5" font-size="11.5" fill="#555555" text-anchor="middle">NTP steps the wall clock -0.5 s</text>
<text x="235.0" y="373.5" font-size="11.5" fill="#555555" text-anchor="middle">wall_now() jumps backward</text>
<text x="235.0" y="388.5" font-size="11.5" fill="#555555" text-anchor="middle">dead peer looks alive (or a +step</text>
<text x="235.0" y="403.5" font-size="11.5" fill="#555555" text-anchor="middle">fires an instant false timeout)</text>
<rect x="470" y="300" width="350" height="132" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="645.0" y="341.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">deadline = mono_now() + timeout</text>
<text x="645.0" y="358.5" font-size="11.5" fill="#555555" text-anchor="middle">the step is invisible here</text>
<text x="645.0" y="373.5" font-size="11.5" fill="#555555" text-anchor="middle">elapsed = mono_now() - start &gt;= 0</text>
<text x="645.0" y="388.5" font-size="11.5" fill="#555555" text-anchor="middle">timeout fires on real silence,</text>
<text x="645.0" y="403.5" font-size="11.5" fill="#555555" text-anchor="middle">never on a clock correction</text>
<path d="M335,172 L645,300" fill="none" stroke="#b8650a" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#am)"/>
<text x="530.0" y="236.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">chatterd reads this</text>
<text x="530.0" y="236.0" font-size="11" fill="#b8650a" text-anchor="middle">chatterd reads this</text>
<text x="440" y="268" font-size="12" fill="#1d1d1d" text-anchor="middle" font-weight="700">peer goes silent; meanwhile ntpd corrects the wall clock</text>
</svg>