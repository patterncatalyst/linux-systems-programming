<text x="20" y="30" font-size="13" fill="#1d1d1d" text-anchor="start" font-weight="700">Process states as ps STAT letters — the kernel keeps a zombie until someone reaps it</text>
<text x="20" y="390" font-size="11" fill="#555555" text-anchor="start">observed: pmon stopped mid-wait (STAT TN) left its exited child as ZN ‘[sleep] &lt;defunct&gt;’ for a 4 s window; SIGCONT reaped it</text>
