<text x="505.0" y="297.0" font-size="11.5" fill="#555555" text-anchor="middle">job control</text>
<rect x="640" y="100" width="250" height="84" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="765.0" y="125.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Zombie  Z</text>
<text x="765.0" y="142.0" font-size="11.5" fill="#555555" text-anchor="middle">&lt;defunct&gt; in ps f</text>
