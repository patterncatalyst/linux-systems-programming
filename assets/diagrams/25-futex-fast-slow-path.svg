<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 440" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="20" y="44" width="900" height="150" rx="12" fill="#eef4fb" stroke="#ddd"/>
<text x="32" y="64" font-size="12" font-weight="700" fill="#1d1d1d">user space — the lock word lives here (glibc pthread / libstdc++ / std)</text>
<rect x="20" y="250" width="900" height="150" rx="12" fill="#f4f4f4" stroke="#ddd"/>
<text x="32" y="270" font-size="12" font-weight="700" fill="#1d1d1d">kernel — entered only when the CAS loses</text>
<rect x="48" y="80" width="150" height="46" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="123.0" y="101.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Thread A: lock()</text>
<text x="123.0" y="118.0" font-size="11.5" fill="#555555" text-anchor="middle">word == 0</text>
<rect x="248" y="72" width="170" height="66" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="333.0" y="95.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">CAS word 0 -&gt; 1</text>
<text x="333.0" y="112.5" font-size="11.5" fill="#555555" text-anchor="middle">one atomic instruction</text>
<text x="333.0" y="127.5" font-size="11.5" fill="#555555" text-anchor="middle">returns: held</text>
<rect x="500" y="80" width="150" height="46" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="575.0" y="101.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Thread B: lock()</text>
<text x="575.0" y="118.0" font-size="11.5" fill="#555555" text-anchor="middle">word == 1, CAS loses</text>
<rect x="720" y="80" width="160" height="46" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="800.0" y="101.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Thread A: unlock()</text>
<text x="800.0" y="118.0" font-size="11.5" fill="#555555" text-anchor="middle">word 1 -&gt; 0</text>
<rect x="470" y="288" width="210" height="74" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="575.0" y="315.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">futex wait queue</text>
<text x="575.0" y="332.5" font-size="11.5" fill="#555555" text-anchor="middle">keyed by (mm, &amp;word)</text>
<text x="575.0" y="347.5" font-size="11.5" fill="#555555" text-anchor="middle">Thread B parked</text>
<path d="M198,103 L248,105" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<text x="229.0" y="98.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">cmpxchg</text>
<text x="229.0" y="98.0" font-size="11" fill="#555" text-anchor="middle">cmpxchg</text>
<path d="M545,126 L520,288" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<text x="474.5" y="201.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">futex(FUTEX_WAIT)</text>
<text x="474.5" y="201.0" font-size="11" fill="#b8650a" text-anchor="middle">futex(FUTEX_WAIT)</text>
<path d="M800,126 L660,288" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<text x="782.0" y="199.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">futex(FUTEX_WAKE)</text>
<text x="782.0" y="199.0" font-size="11" fill="#b8650a" text-anchor="middle">futex(FUTEX_WAKE)</text>
<path d="M640,288 L600,128" fill="none" stroke="#b8650a" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#am)"/>
<text x="666.0" y="238.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">runnable</text>
<text x="666.0" y="238.0" font-size="11" fill="#b8650a" text-anchor="middle">runnable</text>
<text x="48" y="172" font-size="11" fill="#2f6db5" text-anchor="start">Fast path: no syscall. ~98% of lock ops in the 1x1 run stay here.</text>
<text x="470" y="388" font-size="11" fill="#b8650a" text-anchor="start">Slow path: a syscall each way. 1x1 cap256 = 4,583 futex calls; 8x8 cap8 = 491,514.</text>
<text x="20" y="424" font-size="11" fill="#555555" text-anchor="start">voluntary context switches track the parking: 302 (1x1) -&gt; 139,565 (8x8), from /usr/bin/time -v.</text>
</svg>