<path d="M440,240 L345,140" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<text x="484.5" y="198.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">ready: {EPOLLIN, token}</text>
