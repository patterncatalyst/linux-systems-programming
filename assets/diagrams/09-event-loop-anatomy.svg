<rect x="20" y="36" width="840" height="152" rx="12" fill="#f7faff" stroke="#ddd"/>
<text x="32" y="56" font-size="12" font-weight="700" fill="#1d1d1d">user space — one thread; nothing blocks except epoll_wait(2)</text>
