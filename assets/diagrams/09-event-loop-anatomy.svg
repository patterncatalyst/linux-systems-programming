<text x="32" y="248" font-size="12" font-weight="700" fill="#1d1d1d">kernel</text>
<rect x="40" y="76" width="180" height="64" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="130.0" y="98.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">1 · arm timerfd</text>
<text x="130.0" y="115.5" font-size="11.5" fill="#555555" text-anchor="middle">one-shot: min(deadline,</text>
<text x="130.0" y="130.5" font-size="11.5" fill="#555555" text-anchor="middle">earliest debounce due)</text>
<rect x="260" y="76" width="170" height="64" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="345.0" y="98.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">2 · epoll_wait</text>
<text x="345.0" y="115.5" font-size="11.5" fill="#555555" text-anchor="middle">timeout −1:</text>
<text x="345.0" y="130.5" font-size="11.5" fill="#555555" text-anchor="middle">sleep until readiness</text>
<rect x="470" y="76" width="170" height="64" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="555.0" y="98.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">3 · dispatch</text>
<text x="555.0" y="115.5" font-size="11.5" fill="#555555" text-anchor="middle">switch on the</text>
<text x="555.0" y="130.5" font-size="11.5" fill="#555555" text-anchor="middle">data.u32 token</text>
<rect x="680" y="76" width="160" height="64" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="760.0" y="98.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">4 · drain + act</text>
<text x="760.0" y="115.5" font-size="11.5" fill="#555555" text-anchor="middle">read until EAGAIN,</text>
<text x="760.0" y="130.5" font-size="11.5" fill="#555555" text-anchor="middle">coalesce, flush due</text>
<rect x="300" y="240" width="280" height="52" rx="9" fill="#111111" stroke="#111111" stroke-width="2"/>
<text x="440.0" y="264.0" font-size="13.5" font-weight="700" fill="#ffffff" text-anchor="middle">eventpoll — interest list</text>
<text x="440.0" y="281.0" font-size="11.5" fill="#dddddd" text-anchor="middle">tfd 3·4·5, level-triggered EPOLLIN</text>
<rect x="60" y="322" width="200" height="60" rx="9" fill="#f4f4f4" stroke="#888888" stroke-width="1.5"/>
<text x="160.0" y="342.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">inotify fd — token 0</text>
<text x="160.0" y="359.5" font-size="11.5" fill="#555555" text-anchor="middle">wd 1 on DIR, mask 0x3c6</text>
<text x="160.0" y="374.5" font-size="11.5" fill="#555555" text-anchor="middle">per-watch event queue</text>
<rect x="340" y="322" width="200" height="60" rx="9" fill="#f4f4f4" stroke="#888888" stroke-width="1.5"/>
<text x="440.0" y="342.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">timerfd — token 1</text>
<text x="440.0" y="359.5" font-size="11.5" fill="#555555" text-anchor="middle">CLOCK_MONOTONIC,</text>
<text x="440.0" y="374.5" font-size="11.5" fill="#555555" text-anchor="middle">one-shot expirations</text>
<rect x="620" y="322" width="200" height="60" rx="9" fill="#f4f4f4" stroke="#888888" stroke-width="1.5"/>
<text x="720.0" y="342.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">signalfd — token 2</text>
<text x="720.0" y="359.5" font-size="11.5" fill="#555555" text-anchor="middle">blocked SIGINT/SIGTERM</text>
<text x="720.0" y="374.5" font-size="11.5" fill="#555555" text-anchor="middle">as readable data</text>
