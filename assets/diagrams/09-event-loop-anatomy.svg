<text x="440" y="26" font-size="11" fill="#1d1d1d" text-anchor="middle" font-weight="700">fwatch watch — one epoll loop, three event sources</text>
<text x="440" y="424" font-size="12" fill="#666666" text-anchor="middle">Go inverts this picture: the runtime netpoller owns the loop (epoll_pwait) and surfaces each source as a channel</text>
