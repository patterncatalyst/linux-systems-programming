<text x="230.0" y="313.0" font-size="11" fill="#555" text-anchor="middle">file events</text>
<path d="M440,322 L440,292" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<text x="484.0" y="315.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">expiration</text>
