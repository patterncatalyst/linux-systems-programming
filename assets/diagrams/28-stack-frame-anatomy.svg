<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 600" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="20" y="20" width="660" height="560" rx="12" fill="#fafafa" stroke="#ddd"/>
<text x="32" y="40" font-size="12" font-weight="700" fill="#1d1d1d">call stack at the moment of SIGSEGV (gdb bt full on core.app)</text>
<rect x="700" y="20" width="320" height="560" rx="12" fill="#eef4fb" stroke="#ddd"/>
<text x="712" y="40" font-size="12" font-weight="700" fill="#1d1d1d">DWARF .debug_line cross-check
(readelf/objdump --dwarf=decodedline)</text>
<rect x="60" y="60" width="580" height="70" rx="9" fill="#111111" stroke="#111111" stroke-width="2"/>
<text x="350.0" y="93.0" font-size="13.5" font-weight="700" fill="#ffffff" text-anchor="middle">#0  std::println&lt;int,int&gt;  (crash PC)</text>
<text x="350.0" y="110.0" font-size="11.5" fill="#dddddd" text-anchor="middle">/usr/include/c++/16/print:164 -- reads *child.exit_slot here</text>
<rect x="60" y="150" width="580" height="70" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="350.0" y="183.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">#1  (anonymous namespace)::deref(child)</text>
<text x="350.0" y="200.0" font-size="11.5" fill="#555555" text-anchor="middle">main.cpp:52  child = {pid=4242, exit_slot=0x0}</text>
<rect x="60" y="240" width="580" height="70" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="350.0" y="273.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">#2  (anonymous namespace)::handle_child(child)</text>
<text x="350.0" y="290.0" font-size="11.5" fill="#555555" text-anchor="middle">main.cpp:56  return addr 0x00000000004016b2</text>
<rect x="60" y="330" width="580" height="80" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="350.0" y="360.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">#3  (anonymous namespace)::run_supervisor(inject_bug=true)</text>
<text x="350.0" y="377.5" font-size="11.5" fill="#555555" text-anchor="middle">main.cpp:65  return addr 0x000000000040177c</text>
<text x="350.0" y="392.5" font-size="11.5" fill="#555555" text-anchor="middle">child={pid=4242, exit_slot=0x0}, guard=&lt;optimized out&gt;</text>
<rect x="60" y="440" width="580" height="70" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5"/>
<text x="350.0" y="473.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">#4  main(argc, argv)</text>
<text x="350.0" y="490.0" font-size="11.5" fill="#555555" text-anchor="middle">main.cpp:104  return addr 0x0000000000400964</text>
<rect x="730" y="150" width="260" height="60" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="860.0" y="170.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">main.cpp:52 -&gt; 0x401680</text>
<text x="860.0" y="187.5" font-size="11.5" fill="#555555" text-anchor="middle">exact match: gdb&#x27;s own</text>
<text x="860.0" y="202.5" font-size="11.5" fill="#555555" text-anchor="middle">breakpoint address</text>
<rect x="730" y="240" width="260" height="60" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="860.0" y="260.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">main.cpp:56 -&gt; 0x4016b2</text>
<text x="860.0" y="277.5" font-size="11.5" fill="#555555" text-anchor="middle">exact match: #2&#x27;s</text>
<text x="860.0" y="292.5" font-size="11.5" fill="#555555" text-anchor="middle">return address</text>
<rect x="730" y="350" width="260" height="60" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="860.0" y="370.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">main.cpp:65 -&gt; 0x401772</text>
<text x="860.0" y="387.5" font-size="11.5" fill="#555555" text-anchor="middle">close, not exact:</text>
<text x="860.0" y="402.5" font-size="11.5" fill="#555555" text-anchor="middle">#3 is a return addr</text>
<path d="M350,130 L350,150" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M350,220 L350,240" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M350,310 L350,330" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M350,410 L350,440" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M640,185 L730,180" fill="none" stroke="#b8650a" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#am)"/>
<path d="M640,275 L730,270" fill="none" stroke="#b8650a" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#am)"/>
<path d="M640,370 L730,380" fill="none" stroke="#555" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#a)"/>
<text x="60" y="30" font-size="10.5" fill="#666666" text-anchor="start">stack grows toward lower addresses (down this column = older frames)</text>
<text x="60" y="535" font-size="11" fill="#1d1d1d" text-anchor="start">Every frame function is [[gnu::noinline]] so -O2 cannot fold the call chain away.</text>
<text x="60" y="555" font-size="11" fill="#1d1d1d" text-anchor="start">ShutdownGuard&#x27;s destructor (main.cpp) never runs: SIGSEGV does not unwind the stack.</text>
</svg>