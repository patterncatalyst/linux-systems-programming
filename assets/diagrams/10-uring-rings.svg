<text x="318.5" y="121.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">write SQEs</text>
<text x="318.5" y="121.0" font-size="11" fill="#555" text-anchor="middle">write SQEs</text>
