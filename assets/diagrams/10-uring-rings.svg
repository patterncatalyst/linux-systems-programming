<text x="166.0" y="326.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">after enter returns</text>
<text x="166.0" y="326.0" font-size="11" fill="#555" text-anchor="middle">after enter returns</text>
<path d="M345,422 L280,422" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<text x="318.5" y="416.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">pop CQEs</text>
<text x="318.5" y="416.0" font-size="11" fill="#555" text-anchor="middle">pop CQEs</text>
<path d="M810,154 L810,210" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<text x="816.0" y="176.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">ring fd</text>
<text x="816.0" y="176.0" font-size="11" fill="#555" text-anchor="middle">ring fd</text>
<path d="M680,247 L615,237" fill="none" stroke="#555" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#a)"/>
<text x="653.5" y="236.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">consume SQ</text>
<text x="653.5" y="236.0" font-size="11" fill="#555" text-anchor="middle">consume SQ</text>
<path d="M810,284 L810,390" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M680,422 L615,422" fill="none" stroke="#555" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#a)"/>
<text x="653.5" y="416.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">post results</text>
<text x="653.5" y="416.0" font-size="11" fill="#555" text-anchor="middle">post results</text>
<text x="20" y="26" font-size="13" fill="#1d1d1d" text-anchor="start" font-weight="700">io_uring: two lock-free rings shared with the kernel — describe operations, don&#x27;t call them</text>
<text x="320" y="530" font-size="11" fill="#555555" text-anchor="start">on this host (kernel 7.1.3): IORING_FEAT_SINGLE_MMAP — SQ+CQ rings in one 2368-byte mapping at offset 0,</text>
<text x="320" y="546" font-size="11" fill="#555555" text-anchor="start">SQE array in a second mapping at IORING_OFF_SQES (0x10000000)</text>
