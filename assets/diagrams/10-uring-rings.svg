<text x="318.5" y="233.5" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">publish tail</text>
<text x="318.5" y="233.5" font-size="11" fill="#b8650a" text-anchor="middle">publish tail</text>
