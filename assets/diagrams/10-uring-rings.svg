<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 560" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="20" y="40" width="280" height="460" rx="12" fill="#eef4fb" stroke="#ddd"/>
<text x="32" y="60" font-size="12" font-weight="700" fill="#1d1d1d">user space — fwatch</text>
<rect x="320" y="40" width="320" height="460" rx="12" fill="#fff8ef" stroke="#ddd"/>
<text x="332" y="60" font-size="12" font-weight="700" fill="#1d1d1d">shared memory — mmap&#x27;d from the ring fd</text>
<rect x="660" y="40" width="300" height="460" rx="12" fill="#f4f4f4" stroke="#ddd"/>
<text x="672" y="60" font-size="12" font-weight="700" fill="#1d1d1d">kernel</text>
<rect x="40" y="90" width="240" height="74" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="160.0" y="117.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">copy_file_uring()</text>
<text x="160.0" y="134.5" font-size="11.5" fill="#555555" text-anchor="middle">fills up to 16 SQEs per batch</text>
<text x="160.0" y="149.5" font-size="11.5" fill="#555555" text-anchor="middle">8 linked READ→WRITE pairs</text>
<rect x="40" y="210" width="240" height="64" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="160.0" y="240.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">submit_and_wait(2·pairs)</text>
<text x="160.0" y="257.0" font-size="11.5" fill="#555555" text-anchor="middle">store-release SQ tail, then enter</text>
<rect x="40" y="390" width="240" height="64" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="160.0" y="420.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">drain() — pop CQEs</text>
<text x="160.0" y="437.0" font-size="11.5" fill="#555555" text-anchor="middle">load-acquire CQ tail, bump head</text>
<rect x="345" y="90" width="270" height="74" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="480.0" y="117.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">SQ ring</text>
<text x="480.0" y="134.5" font-size="11.5" fill="#555555" text-anchor="middle">head · tail · ring_mask · array[]</text>
<text x="480.0" y="149.5" font-size="11.5" fill="#555555" text-anchor="middle">indices into the SQE array</text>
<rect x="345" y="200" width="270" height="74" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="480.0" y="227.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">SQE array (64 × io_uring_sqe)</text>
<text x="480.0" y="244.5" font-size="11.5" fill="#555555" text-anchor="middle">opcode, fd, addr, len, off,</text>
<text x="480.0" y="259.5" font-size="11.5" fill="#555555" text-anchor="middle">flags (IOSQE_IO_LINK), user_data</text>
<rect x="345" y="390" width="270" height="74" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="480.0" y="417.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">CQ ring (128 × io_uring_cqe)</text>
<text x="480.0" y="434.5" font-size="11.5" fill="#555555" text-anchor="middle">head · tail · cqes[]</text>
<text x="480.0" y="449.5" font-size="11.5" fill="#555555" text-anchor="middle">cqe.res = result, cqe.user_data</text>
<rect x="680" y="90" width="260" height="64" rx="9" fill="#f4f4f4" stroke="#888888" stroke-width="1.5"/>
<text x="810.0" y="120.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">io_uring_setup(64, &amp;params)</text>
<text x="810.0" y="137.0" font-size="11.5" fill="#555555" text-anchor="middle">one fd; rings mmap&#x27;d from it</text>
<rect x="680" y="210" width="260" height="74" rx="9" fill="#111111" stroke="#111111" stroke-width="2"/>
<text x="810.0" y="237.5" font-size="13.5" font-weight="700" fill="#ffffff" text-anchor="middle">io_uring_enter(fd, 16, 16,</text>
<text x="810.0" y="254.5" font-size="11.5" fill="#dddddd" text-anchor="middle">GETEVENTS)</text>
<text x="810.0" y="269.5" font-size="11.5" fill="#dddddd" text-anchor="middle">submit N + wait, one syscall</text>
<rect x="680" y="390" width="260" height="64" rx="9" fill="#f4f4f4" stroke="#888888" stroke-width="1.5"/>
<text x="810.0" y="420.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">executes SQEs, posts CQEs</text>
<text x="810.0" y="437.0" font-size="11.5" fill="#555555" text-anchor="middle">store-release CQ tail</text>
