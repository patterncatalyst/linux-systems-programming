<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 366" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="20" y="44" width="860" height="168" rx="12" fill="#eef4fb" stroke="#ddd"/>
<text x="32" y="64" font-size="12" font-weight="700" fill="#1d1d1d">Two threads, two owned counters — no lock</text>
<rect x="20" y="232" width="860" height="118" rx="12" fill="#f4f4f4" stroke="#ddd"/>
<text x="32" y="252" font-size="12" font-weight="700" fill="#1d1d1d">Shared ring buf[K] — slot for logical position p is buf[p % K]</text>
<rect x="40" y="92" width="228" height="96" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="154.0" y="123.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Producer (core 0)</text>
<text x="154.0" y="140.0" font-size="11.5" fill="#555555" text-anchor="middle">owns tail, reads head</text>
<text x="154.0" y="155.0" font-size="11.5" fill="#555555" text-anchor="middle">buf[t%K] = v</text>
<text x="154.0" y="170.0" font-size="11.5" fill="#555555" text-anchor="middle">tail.store(t+1, Release)</text>
<rect x="632" y="92" width="228" height="96" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="746.0" y="123.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Consumer (core 2)</text>
<text x="746.0" y="140.0" font-size="11.5" fill="#555555" text-anchor="middle">owns head, reads tail</text>
<text x="746.0" y="155.0" font-size="11.5" fill="#555555" text-anchor="middle">v = buf[h%K]</text>
<text x="746.0" y="170.0" font-size="11.5" fill="#555555" text-anchor="middle">head.store(h+1, Release)</text>
<rect x="352" y="78" width="90" height="48" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="397.0" y="100.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">tail</text>
<text x="397.0" y="117.0" font-size="11.5" fill="#555555" text-anchor="middle">one writer</text>
<rect x="452" y="78" width="90" height="48" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="497.0" y="100.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">head</text>
<text x="497.0" y="117.0" font-size="11.5" fill="#555555" text-anchor="middle">one writer</text>
