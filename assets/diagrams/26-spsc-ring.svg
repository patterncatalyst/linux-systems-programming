<text x="333.5" y="193.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">tail Release publishes buf[t%K]</text>
<text x="333.5" y="193.0" font-size="11" fill="#b8650a" text-anchor="middle">tail Release publishes buf[t%K]</text>
<text x="40" y="344" font-size="11" fill="#555555" text-anchor="start">occupancy = tail - head = 2   |   full when tail - head == K   |   empty when head == tail</text>
