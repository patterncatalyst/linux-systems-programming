<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 540" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="20" y="40" width="460" height="440" rx="12" fill="#eef4fb" stroke="#ddd"/>
<text x="32" y="60" font-size="12" font-weight="700" fill="#1d1d1d">readiness — epoll (chapter 9)</text>
<rect x="500" y="40" width="460" height="440" rx="12" fill="#fff8ef" stroke="#ddd"/>
<text x="512" y="60" font-size="12" font-weight="700" fill="#1d1d1d">completion — io_uring (this chapter)</text>
<rect x="60" y="80" width="380" height="56" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="250.0" y="106.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">epoll_wait(epfd, ...)</text>
<text x="250.0" y="123.0" font-size="11.5" fill="#555555" text-anchor="middle">“tell me when these fds are ready”</text>
<rect x="60" y="176" width="380" height="56" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="250.0" y="202.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">kernel: readiness events</text>
<text x="250.0" y="219.0" font-size="11.5" fill="#555555" text-anchor="middle">fd 7 readable, fd 12 writable ...</text>
<rect x="60" y="272" width="380" height="56" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="250.0" y="298.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">you still do the I/O yourself</text>
<text x="250.0" y="315.0" font-size="11.5" fill="#555555" text-anchor="middle">read(fd) / write(fd) — one syscall per op</text>
<rect x="60" y="368" width="380" height="56" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="250.0" y="394.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">and it can still fail with EAGAIN</text>
<text x="250.0" y="411.0" font-size="11.5" fill="#555555" text-anchor="middle">readiness is a hint, not a result</text>
<rect x="540" y="80" width="380" height="56" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="730.0" y="106.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">queue SQEs describing the I/O</text>
<text x="730.0" y="123.0" font-size="11.5" fill="#555555" text-anchor="middle">“read 128 KiB at offset 0 into this buffer”</text>
<rect x="540" y="176" width="380" height="56" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="730.0" y="202.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">io_uring_enter — submit N, wait M</text>
<text x="730.0" y="219.0" font-size="11.5" fill="#555555" text-anchor="middle">one syscall carries the whole batch</text>
<rect x="540" y="272" width="380" height="56" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="730.0" y="298.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">kernel does the I/O</text>
<text x="730.0" y="315.0" font-size="11.5" fill="#555555" text-anchor="middle">inline if it can, io-wq workers if it would block</text>
<rect x="540" y="368" width="380" height="56" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="730.0" y="394.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">CQEs carry finished results</text>
<text x="730.0" y="411.0" font-size="11.5" fill="#555555" text-anchor="middle">cqe.res = bytes done — no second syscall</text>
<path d="M250,136 L250,176" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M250,232 L250,272" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<text x="256.0" y="246.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">wakeup</text>
<text x="256.0" y="246.0" font-size="11" fill="#555" text-anchor="middle">wakeup</text>
<path d="M250,328 L250,368" fill="none" stroke="#555" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#a)"/>
<path d="M730,136 L730,176" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M730,232 L730,272" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<text x="736.0" y="246.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">submit</text>
<text x="736.0" y="246.0" font-size="11" fill="#b8650a" text-anchor="middle">submit</text>
<path d="M730,328 L730,368" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<text x="736.0" y="342.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">complete</text>
<text x="736.0" y="342.0" font-size="11" fill="#b8650a" text-anchor="middle">complete</text>
<text x="20" y="26" font-size="13" fill="#1d1d1d" text-anchor="start" font-weight="700">Readiness answers “may I?” per fd; completion answers “it&#x27;s done” per operation</text>
<text x="60" y="460" font-size="11" fill="#555555" text-anchor="start">fwatch rw engine on 403 files: 850 read(2) + 444 write(2)</text>
<text x="540" y="460" font-size="11" fill="#555555" text-anchor="start">fwatch uring engine, same tree: 407 io_uring_enter(2), zero data read/write</text>
</svg>