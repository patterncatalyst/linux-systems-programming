<text x="174.0" y="124.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">malloc x N</text>
<text x="174.0" y="124.0" font-size="11" fill="#555" text-anchor="middle">malloc x N</text>
<path d="M168,216 L168,256" fill="none" stroke="#555" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#a)"/>
<text x="174.0" y="230.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">free x N</text>
<text x="174.0" y="230.0" font-size="11" fill="#555" text-anchor="middle">free x N</text>
<path d="M168,308 L168,340" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M480,110 L480,150" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<text x="486.0" y="124.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">bump += size</text>
<text x="486.0" y="124.0" font-size="11" fill="#b8650a" text-anchor="middle">bump += size</text>
<path d="M480,216 L480,256" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<text x="486.0" y="230.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">1 release / batch</text>
<text x="486.0" y="230.0" font-size="11" fill="#b8650a" text-anchor="middle">1 release / batch</text>
<path d="M480,308 L480,340" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M792,110 L792,150" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<text x="798.0" y="124.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">allocate; drop refs</text>
<text x="798.0" y="124.0" font-size="11" fill="#555" text-anchor="middle">allocate; drop refs</text>
<path d="M792,216 L792,256" fill="none" stroke="#555" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#a)"/>
<text x="798.0" y="230.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">cycle fires</text>
<text x="798.0" y="230.0" font-size="11" fill="#555" text-anchor="middle">cycle fires</text>
<path d="M792,308 L792,340" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<text x="480" y="440" font-size="11" fill="#555555" text-anchor="middle">all numbers: allocbench --allocs 200000 on the reference host — peak_rss is getrusage ru_maxrss (KB)</text>
