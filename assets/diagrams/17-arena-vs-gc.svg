<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 460" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="20" y="20" width="296" height="390" rx="12" fill="#fafafa" stroke="#ddd"/>
<text x="32" y="40" font-size="12" font-weight="700" fill="#1d1d1d">free one by one — glibc malloc / Rust GlobalAlloc</text>
<rect x="332" y="20" width="296" height="390" rx="12" fill="#fff8ef" stroke="#ddd"/>
<text x="344" y="40" font-size="12" font-weight="700" fill="#1d1d1d">arena / pool — pmr, bumpalo, sync.Pool</text>
<rect x="644" y="20" width="296" height="390" rx="12" fill="#eef4fb" stroke="#ddd"/>
<text x="656" y="40" font-size="12" font-weight="700" fill="#1d1d1d">tracing GC — the Go heap</text>
<rect x="48" y="58" width="240" height="52" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="168.0" y="82.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">200,000 short-lived strings</text>
<text x="168.0" y="99.0" font-size="11.5" fill="#555555" text-anchor="middle">key / frag / value per iteration</text>
<rect x="48" y="150" width="240" height="66" rx="9" fill="#f4f4f4" stroke="#888888" stroke-width="1.5"/>
<text x="168.0" y="173.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">main arena + tcache</text>
<text x="168.0" y="190.5" font-size="11.5" fill="#555555" text-anchor="middle">64 cached chunks/size class,</text>
<text x="168.0" y="205.5" font-size="11.5" fill="#555555" text-anchor="middle">then small/large bins</text>
<rect x="48" y="256" width="240" height="52" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="168.0" y="280.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">pages stay with the process</text>
<text x="168.0" y="297.0" font-size="11.5" fill="#555555" text-anchor="middle">mallinfo2: arena 6340KB after free</text>
<rect x="48" y="340" width="240" height="52" rx="9" fill="#111111" stroke="#111111" stroke-width="2"/>
<text x="168.0" y="364.0" font-size="13.5" font-weight="700" fill="#ffffff" text-anchor="middle">C++ 3908KB / Rust 2548KB</text>
<text x="168.0" y="381.0" font-size="11.5" fill="#dddddd" text-anchor="middle">one free() per object</text>
<rect x="360" y="58" width="240" height="52" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="480.0" y="82.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">same 200,000 intermediates</text>
<text x="480.0" y="99.0" font-size="11.5" fill="#555555" text-anchor="middle">batch of 1,000 at a time</text>
<rect x="360" y="150" width="240" height="66" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="480.0" y="173.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">one reusable slab</text>
<text x="480.0" y="190.5" font-size="11.5" fill="#555555" text-anchor="middle">256KiB, bump pointer;</text>
<text x="480.0" y="205.5" font-size="11.5" fill="#555555" text-anchor="middle">survivors copied out</text>
<rect x="360" y="256" width="240" height="52" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="480.0" y="280.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">reset() / ~resource / Pool.Put</text>
<text x="480.0" y="297.0" font-size="11.5" fill="#555555" text-anchor="middle">whole batch reclaimed in O(1)</text>
<rect x="360" y="340" width="240" height="52" rx="9" fill="#111111" stroke="#111111" stroke-width="2"/>
<text x="480.0" y="364.0" font-size="13.5" font-weight="700" fill="#ffffff" text-anchor="middle">C++ 4240KB / Rust 2544KB</text>
<text x="480.0" y="381.0" font-size="11.5" fill="#dddddd" text-anchor="middle">zero per-object frees</text>
<rect x="672" y="58" width="240" height="52" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="792.0" y="82.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">same churn, now garbage</text>
<text x="792.0" y="99.0" font-size="11.5" fill="#555555" text-anchor="middle">collector must find it</text>
<rect x="672" y="150" width="240" height="66" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="792.0" y="173.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">pacer: GOGC / GOMEMLIMIT</text>
<text x="792.0" y="190.5" font-size="11.5" fill="#555555" text-anchor="middle">trigger when heap grows GOGC%</text>
<text x="792.0" y="205.5" font-size="11.5" fill="#555555" text-anchor="middle">or nears the soft limit</text>
<rect x="672" y="256" width="240" height="52" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="792.0" y="280.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">concurrent mark + sweep</text>
<text x="792.0" y="297.0" font-size="11.5" fill="#555555" text-anchor="middle">gc_cycles: 9 (default)</text>
<rect x="672" y="340" width="240" height="52" rx="9" fill="#111111" stroke="#111111" stroke-width="2"/>
<text x="792.0" y="364.0" font-size="13.5" font-weight="700" fill="#ffffff" text-anchor="middle">8064KB @ 9 cycles</text>
<text x="792.0" y="381.0" font-size="11.5" fill="#dddddd" text-anchor="middle">GOMEMLIMIT=8MiB: 5676KB @ 47</text>
