<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 460" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="20" y="30" width="430" height="380" rx="12" fill="#fff8ef" stroke="#ddd"/>
<text x="32" y="50" font-size="12" font-weight="700" fill="#1d1d1d">serve (installs handlers)</text>
<rect x="490" y="30" width="430" height="380" rx="12" fill="#f4f4f4" stroke="#ddd"/>
<text x="502" y="50" font-size="12" font-weight="700" fill="#1d1d1d">naive (installs none)</text>
<rect x="44" y="66" width="380" height="40" rx="9" fill="#111111" stroke="#111111" stroke-width="2"/>
<text x="234.0" y="91.5" font-size="13.5" font-weight="700" fill="#ffffff" text-anchor="middle">podman stop -t 3  -&gt;  SIGTERM to PID 1</text>
<rect x="44" y="122" width="380" height="50" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="234.0" y="145.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">signalfd/Notify/Signals wakes</text>
<text x="234.0" y="162.0" font-size="11.5" fill="#555555" text-anchor="middle">job_spawner.request_stop()</text>
<rect x="44" y="188" width="380" height="50" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="234.0" y="211.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">kill(worker, SIGTERM); waitpid/Wait()</text>
<text x="234.0" y="228.0" font-size="11.5" fill="#555555" text-anchor="middle">worker reaped</text>
<rect x="44" y="254" width="380" height="40" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="234.0" y="279.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">print &quot;app: shutting down (SIGTERM)&quot;</text>
<rect x="44" y="310" width="380" height="60" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="234.0" y="338.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">exit 0 -- measured: cpp 192ms, go 60ms, rust 101ms</text>
<text x="234.0" y="355.0" font-size="11.5" fill="#555555" text-anchor="middle">(3000ms grace budget)</text>
<rect x="514" y="66" width="380" height="40" rx="9" fill="#111111" stroke="#111111" stroke-width="2"/>
<text x="704.0" y="91.5" font-size="13.5" font-weight="700" fill="#ffffff" text-anchor="middle">podman stop -t 2  -&gt;  SIGTERM to PID 1</text>
<rect x="514" y="122" width="380" height="70" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="704.0" y="147.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">kernel: PID 1 has no explicit SIGTERM handler</text>
<text x="704.0" y="164.5" font-size="11.5" fill="#555555" text-anchor="middle">-&gt; default action (terminate) is masked, not run</text>
<text x="704.0" y="179.5" font-size="11.5" fill="#555555" text-anchor="middle">cpp/rust: signal is simply dropped</text>
<rect x="514" y="210" width="380" height="40" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5"/>
<text x="704.0" y="235.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Go exception: runtime installs its own fatal-signal</text>
<rect x="514" y="256" width="380" height="40" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5"/>
<text x="704.0" y="281.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">handler at startup regardless of signal.Notify</text>
<rect x="514" y="312" width="380" height="60" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="704.0" y="340.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">measured: cpp 2108ms, rust 2074ms (full grace, SIGKILLed)</text>
<text x="704.0" y="357.0" font-size="11.5" fill="#555555" text-anchor="middle">go 60ms (dies anyway -- but no shutdown line, no cleanup)</text>
