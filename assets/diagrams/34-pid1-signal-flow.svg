<path d="M234,172 L234,188" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<path d="M234,238 L234,254" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<path d="M234,294 L234,310" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<path d="M704,106 L704,122" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M704,192 L704,210" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M704,250 L704,256" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M704,296 L704,312" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<text x="470" y="30" font-size="16" fill="#1d1d1d" text-anchor="middle" font-weight="700">vs</text>
</svg>