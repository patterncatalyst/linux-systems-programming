<text x="642.0" y="229.0" font-size="11" fill="#555" text-anchor="middle">tail — read drains here</text>
<text x="300" y="105" font-size="11" fill="#555555" text-anchor="start">ring of 16 slots, one page each — only 8 drawn</text>
<text x="300" y="262" font-size="11" fill="#1d1d1d" text-anchor="start" font-weight="700">capacity: 16 × 4096 B = 65536 B — read live with fcntl(F_GETPIPE_SZ)</text>
<text x="300" y="284" font-size="11" fill="#1d1d1d" text-anchor="start">F_SETPIPE_SZ asked for 1 → rounded up to 4096 (one page);</text>
<text x="300" y="300" font-size="11" fill="#1d1d1d" text-anchor="start">ceiling: /proc/sys/fs/pipe-max-size = 1048576 (unprivileged)</text>
<text x="300" y="328" font-size="11" fill="#b8650a" text-anchor="start">PIPE_BUF = 4096: one write() of ≤ 4096 B never interleaves with</text>
<text x="300" y="344" font-size="11" fill="#b8650a" text-anchor="start">another writer&#x27;s — but reads may still return partial chunks:</text>
<text x="300" y="360" font-size="11" fill="#b8650a" text-anchor="start">atomicity is not message framing, and not delivery</text>
<text x="30" y="270" font-size="11" fill="#1d1d1d" text-anchor="start">all write ends closed →</text>
<text x="30" y="286" font-size="11" fill="#1d1d1d" text-anchor="start">read() returns 0 (EOF)</text>
<text x="740" y="270" font-size="11" fill="#1d1d1d" text-anchor="start">no read end left → write()</text>
<text x="740" y="286" font-size="11" fill="#1d1d1d" text-anchor="start">raises SIGPIPE / EPIPE</text>
<text x="20" y="34" font-size="12" fill="#1d1d1d" text-anchor="start" font-weight="700">one pipe from the chapter&#x27;s live supervise run — both fd numbers, the inode, and every byte count are from /proc</text>
