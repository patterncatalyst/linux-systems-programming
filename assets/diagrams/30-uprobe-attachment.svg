<text x="210.0" y="73.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">C++23 binary (app)</text>
<text x="210.0" y="90.0" font-size="11.5" fill="#555555" text-anchor="middle">nm: t _ZN12_GLOBAL__N_1L8cmd_workEi.isra.0</text>
<rect x="40" y="130" width="340" height="50" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5"/>
<text x="210.0" y="153.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">c++filt (auto Itanium ABI)</text>
<text x="210.0" y="170.0" font-size="11.5" fill="#555555" text-anchor="middle">-&gt; (anonymous namespace)::cmd_work(int)</text>
<rect x="40" y="210" width="340" height="50" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="210.0" y="233.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">uprobe:app:_ZN12_GLOBAL__N_1L8cmd_workEi.isra.0</text>
<text x="210.0" y="250.0" font-size="11.5" fill="#555555" text-anchor="middle">attach target is the MANGLED string</text>
<rect x="40" y="290" width="340" height="60" rx="9" fill="#111111" stroke="#111111" stroke-width="2"/>
<text x="210.0" y="318.0" font-size="13.5" font-weight="700" fill="#ffffff" text-anchor="middle">fired: seconds_arg=5 (--seconds 5)</text>
<text x="210.0" y="335.0" font-size="11.5" fill="#dddddd" text-anchor="middle">arg0==RDI is correct: SysV x86-64 ABI</text>
<rect x="420" y="50" width="340" height="50" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="590.0" y="73.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Rust binary (app)</text>
<text x="590.0" y="90.0" font-size="11.5" fill="#555555" text-anchor="middle">nm: t _RNvCs6FzKXswKZCc_3app8cmd_work</text>
<rect x="420" y="130" width="340" height="50" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5"/>
<text x="590.0" y="153.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">c++filt (auto-detects Rust v0)</text>
<text x="590.0" y="170.0" font-size="11.5" fill="#555555" text-anchor="middle">-&gt; app[4db24ee1e6ed4506]::cmd_work</text>
<rect x="420" y="210" width="340" height="50" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="590.0" y="233.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">uprobe:app:_RNvCs6FzKXswKZCc_3app8cmd_work</text>
<text x="590.0" y="250.0" font-size="11.5" fill="#555555" text-anchor="middle">attach target is the MANGLED string</text>
<rect x="420" y="290" width="340" height="60" rx="9" fill="#111111" stroke="#111111" stroke-width="2"/>
<text x="590.0" y="318.0" font-size="13.5" font-weight="700" fill="#ffffff" text-anchor="middle">fired: seconds_arg=7 (--seconds 7)</text>
<text x="590.0" y="335.0" font-size="11.5" fill="#dddddd" text-anchor="middle">arg0==RDI is correct: SysV x86-64 ABI</text>
<rect x="800" y="50" width="340" height="50" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="970.0" y="73.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Go binary (app)</text>
<text x="970.0" y="90.0" font-size="11.5" fill="#555555" text-anchor="middle">nm: T main.cmdWork  (never mangled)</text>
<rect x="800" y="130" width="340" height="50" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5"/>
<text x="970.0" y="153.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">no demangling needed;</text>
<text x="970.0" y="170.0" font-size="11.5" fill="#555555" text-anchor="middle">package-qualified name IS the symbol</text>
<rect x="800" y="210" width="340" height="50" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="970.0" y="233.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">uprobe:app:main.cmdWork</text>
<text x="970.0" y="250.0" font-size="11.5" fill="#555555" text-anchor="middle">plain, unmangled attach target</text>
<rect x="800" y="290" width="340" height="60" rx="9" fill="#111111" stroke="#111111" stroke-width="2"/>
<text x="970.0" y="318.0" font-size="13.5" font-weight="700" fill="#ffffff" text-anchor="middle">fired with --seconds 9:</text>
<text x="970.0" y="335.0" font-size="11.5" fill="#dddddd" text-anchor="middle">RDI(arg0)=1 WRONG   RAX=9 RIGHT</text>
<rect x="40" y="400" width="1100" height="90" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="590.0" y="435.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Go&#x27;s ABIInternal (1.17+) passes integer args in RAX,RBX,RCX,RDI,RSI,R8,R9,...</text>
<text x="590.0" y="452.5" font-size="11.5" fill="#555555" text-anchor="middle">not the SysV RDI,RSI,RDX,... order bpftrace&#x27;s arg0/arg1 assumes</text>
<text x="590.0" y="467.5" font-size="11.5" fill="#555555" text-anchor="middle">goroutine stacks also grow by copying, so a captured stack address can move under a probe</text>
