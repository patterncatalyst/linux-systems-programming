<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 500" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="20" y="20" width="430" height="150" rx="12" fill="#eef4fb" stroke="#ddd"/>
<text x="32" y="40" font-size="12" font-weight="700" fill="#1d1d1d">process A — shmkv set (writer)</text>
<rect x="490" y="20" width="430" height="150" rx="12" fill="#eef4fb" stroke="#ddd"/>
<text x="502" y="40" font-size="12" font-weight="700" fill="#1d1d1d">process B — shmkv get (reader)</text>
<rect x="20" y="210" width="900" height="130" rx="12" fill="#f4f4f4" stroke="#ddd"/>
<text x="32" y="230" font-size="12" font-weight="700" fill="#1d1d1d">kernel — one page cache, shared by every mapper</text>
<rect x="20" y="380" width="900" height="100" rx="12" fill="#fafafa" stroke="#ddd"/>
<text x="32" y="400" font-size="12" font-weight="700" fill="#1d1d1d">disk</text>
<rect x="50" y="55" width="230" height="90" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="165.0" y="90.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">mmap MAP_SHARED</text>
<text x="165.0" y="107.5" font-size="11.5" fill="#555555" text-anchor="middle">rw-s in /proc/self/maps</text>
<text x="165.0" y="122.5" font-size="11.5" fill="#555555" text-anchor="middle">store = plain memory write</text>
<rect x="300" y="55" width="130" height="90" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="365.0" y="90.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">MAP_PRIVATE</text>
<text x="365.0" y="107.5" font-size="11.5" fill="#555555" text-anchor="middle">COW copy,</text>
<text x="365.0" y="122.5" font-size="11.5" fill="#555555" text-anchor="middle">never written back</text>
<rect x="560" y="55" width="290" height="90" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="705.0" y="90.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">mmap MAP_SHARED</text>
<text x="705.0" y="107.5" font-size="11.5" fill="#555555" text-anchor="middle">rw-s, same inode, same offset</text>
<text x="705.0" y="122.5" font-size="11.5" fill="#555555" text-anchor="middle">load = plain memory read</text>
<rect x="310" y="240" width="330" height="80" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="475.0" y="278.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">page-cache pages of store.kv</text>
<text x="475.0" y="295.0" font-size="11.5" fill="#555555" text-anchor="middle">1034 bytes, one copy for all mappers</text>
<rect x="335" y="400" width="280" height="60" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="475.0" y="428.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">store.kv on disk</text>
<text x="475.0" y="445.0" font-size="11.5" fill="#555555" text-anchor="middle">durable only after msync / writeback</text>
<path d="M165,145 L380,240" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<text x="242.5" y="186.5" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">store</text>
<text x="242.5" y="186.5" font-size="11" fill="#b8650a" text-anchor="middle">store</text>
<path d="M705,145 L570,240" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<text x="667.5" y="186.5" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">load</text>
<text x="667.5" y="186.5" font-size="11" fill="#555" text-anchor="middle">load</text>
<path d="M445,240 L380,145" fill="none" stroke="#555" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#a)"/>
<text x="478.5" y="158.5" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">first write copies the page</text>
<text x="478.5" y="158.5" font-size="11" fill="#555" text-anchor="middle">first write copies the page</text>
<path d="M440,320 L440,400" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<text x="378.0" y="354.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">msync(MS_SYNC)</text>
<text x="378.0" y="354.0" font-size="11" fill="#b8650a" text-anchor="middle">msync(MS_SYNC)</text>
<path d="M520,320 L520,400" fill="none" stroke="#555" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#a)"/>
<text x="594.0" y="354.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">writeback, eventually</text>
<text x="594.0" y="354.0" font-size="11" fill="#555" text-anchor="middle">writeback, eventually</text>
<text x="50" y="360" font-size="11" fill="#555555" text-anchor="start">A&#x27;s store and B&#x27;s load meet in the same physical pages — no copy, no syscall between them</text>
</svg>