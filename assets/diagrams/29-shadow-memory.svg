<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 490" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="20" y="20" width="980" height="190" rx="12" fill="#eef4fb" stroke="#ddd"/>
<text x="32" y="40" font-size="12" font-weight="700" fill="#1d1d1d">Application memory -- real addresses from this chapter&#x27;s ASan `uaf` run</text>
<rect x="20" y="240" width="980" height="190" rx="12" fill="#fff8ef" stroke="#ddd"/>
<text x="32" y="260" font-size="12" font-weight="700" fill="#1d1d1d">Shadow memory -- 1 shadow byte encodes the state of 8 application bytes</text>
<rect x="60" y="70" width="260" height="70" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="190.0" y="95.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">left redzone</text>
<text x="190.0" y="112.5" font-size="11.5" fill="#555555" text-anchor="middle">0x7b29be3dff80..ffff</text>
<text x="190.0" y="127.5" font-size="11.5" fill="#555555" text-anchor="middle">never allocated to this block</text>
<rect x="340" y="70" width="260" height="70" rx="9" fill="#111111" stroke="#111111" stroke-width="2"/>
<text x="470.0" y="95.5" font-size="13.5" font-weight="700" fill="#ffffff" text-anchor="middle">int* p  (4 bytes)</text>
<text x="470.0" y="112.5" font-size="11.5" fill="#dddddd" text-anchor="middle">0x7b29be3e0010</text>
<text x="470.0" y="127.5" font-size="11.5" fill="#dddddd" text-anchor="middle">new&#x27;d, then delete&#x27;d -- *p=7 UB here</text>
<rect x="620" y="70" width="260" height="70" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="750.0" y="95.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">right redzone</text>
<text x="750.0" y="112.5" font-size="11.5" fill="#555555" text-anchor="middle">0x7b29be3e0018..007f</text>
<text x="750.0" y="127.5" font-size="11.5" fill="#555555" text-anchor="middle">padding around the block</text>
<rect x="60" y="290" width="260" height="70" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="190.0" y="315.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">shadow byte: fa</text>
<text x="190.0" y="332.5" font-size="11.5" fill="#555555" text-anchor="middle">&quot;Heap left redzone&quot;</text>
<text x="190.0" y="347.5" font-size="11.5" fill="#555555" text-anchor="middle">covers 0x...ff80-ff87 .. -0007</text>
<rect x="340" y="290" width="260" height="70" rx="9" fill="#111111" stroke="#111111" stroke-width="2"/>
<text x="470.0" y="315.5" font-size="13.5" font-weight="700" fill="#ffffff" text-anchor="middle">shadow byte: fd</text>
<text x="470.0" y="332.5" font-size="11.5" fill="#dddddd" text-anchor="middle">&quot;Freed heap region&quot;</text>
<text x="470.0" y="347.5" font-size="11.5" fill="#dddddd" text-anchor="middle">the exact byte the write to *p trips</text>
<rect x="620" y="290" width="260" height="70" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="750.0" y="315.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">shadow byte: fa</text>
<text x="750.0" y="332.5" font-size="11.5" fill="#555555" text-anchor="middle">&quot;Heap left redzone&quot;</text>
<text x="750.0" y="347.5" font-size="11.5" fill="#555555" text-anchor="middle">(next block&#x27;s guard)</text>
<rect x="60" y="370" width="820" height="40" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="470.0" y="395.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">shadow_addr = (app_addr &gt;&gt; 3) + offset  --  one comparison before every load/store, not a full CPU emulation</text>
<path d="M190,140 L190,290" fill="none" stroke="#555" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#a)"/>
<path d="M470,140 L470,290" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<text x="476.0" y="209.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">&gt;&gt;3 + offset</text>
<text x="476.0" y="209.0" font-size="11" fill="#b8650a" text-anchor="middle">&gt;&gt;3 + offset</text>
<path d="M750,140 L750,290" fill="none" stroke="#555" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#a)"/>
<text x="60" y="448" font-size="11" fill="#1d1d1d" text-anchor="start">Real shadow legend from this session&#x27;s ASan run: 00 addressable, 01-07 partially addressable, fa heap left/right redzone, fd freed heap region, f1-f8 stack states, f9 global redzone.</text>
<text x="60" y="466" font-size="11" fill="#1d1d1d" text-anchor="start">The inline check is why sanitizer overhead stays close to native: this chapter&#x27;s TSan race run took 0.046s and native 0.002s, versus valgrind&#x27;s binary-translation memcheck at 1.0s for the same tiny program.</text>
</svg>