<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 470" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="20" y="20" width="900" height="180" rx="12" fill="#eef4fb" stroke="#ddd"/>
<text x="32" y="40" font-size="12" font-weight="700" fill="#1d1d1d">READ PATH — recv to EAGAIN, reassemble frames, fan out</text>
<rect x="20" y="215" width="900" height="235" rx="12" fill="#fff8ef" stroke="#ddd"/>
<text x="32" y="235" font-size="12" font-weight="700" fill="#1d1d1d">WRITE PATH + BACKPRESSURE — outbuf queue, EPOLLOUT re-arm</text>
<rect x="45" y="70" width="165" height="66" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="127.5" y="93.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">recv() loop</text>
<text x="127.5" y="110.5" font-size="11.5" fill="#555555" text-anchor="middle">drain nonblocking</text>
<text x="127.5" y="125.5" font-size="11.5" fill="#555555" text-anchor="middle">until EAGAIN</text>
<rect x="255" y="70" width="165" height="66" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="337.5" y="93.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">inbuf</text>
<text x="337.5" y="110.5" font-size="11.5" fill="#555555" text-anchor="middle">reassemble partial</text>
<text x="337.5" y="125.5" font-size="11.5" fill="#555555" text-anchor="middle">frames across reads</text>
<rect x="465" y="70" width="165" height="66" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="547.5" y="93.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">take_frame()</text>
<text x="547.5" y="110.5" font-size="11.5" fill="#555555" text-anchor="middle">one whole 6+LEN</text>
<text x="547.5" y="125.5" font-size="11.5" fill="#555555" text-anchor="middle">frame? or wait</text>
<rect x="690" y="70" width="205" height="66" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="792.5" y="93.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">MSG -&gt; broadcast()</text>
<text x="792.5" y="110.5" font-size="11.5" fill="#555555" text-anchor="middle">append frame to EVERY</text>
<text x="792.5" y="125.5" font-size="11.5" fill="#555555" text-anchor="middle">conn&#x27;s outbuf</text>
<rect x="690" y="255" width="205" height="62" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="792.5" y="284.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">queue() + flush()</text>
<text x="792.5" y="301.0" font-size="11.5" fill="#555555" text-anchor="middle">send() what fits now</text>
<rect x="465" y="250" width="165" height="72" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="547.5" y="276.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">outbuf</text>
<text x="547.5" y="293.5" font-size="11.5" fill="#555555" text-anchor="middle">the backpressure queue</text>
<text x="547.5" y="308.5" font-size="11.5" fill="#555555" text-anchor="middle">remainder after EAGAIN</text>
<rect x="255" y="255" width="165" height="62" rx="9" fill="#f4f4f4" stroke="#888888" stroke-width="1.5"/>
<text x="337.5" y="284.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">kernel socket buffer</text>
<text x="337.5" y="301.0" font-size="11.5" fill="#555555" text-anchor="middle">full -&gt; send() EAGAIN</text>
<rect x="45" y="362" width="185" height="68" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="137.5" y="386.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">epoll_wait</text>
<text x="137.5" y="403.5" font-size="11.5" fill="#555555" text-anchor="middle">later reports EPOLLOUT</text>
<text x="137.5" y="418.5" font-size="11.5" fill="#555555" text-anchor="middle">for this conn</text>
