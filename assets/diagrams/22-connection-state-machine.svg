<path d="M420,103 L463,103" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M630,103 L688,103" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M792,136 L792,253" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<text x="798.0" y="188.5" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">for each conn</text>
<text x="798.0" y="188.5" font-size="11" fill="#555" text-anchor="middle">for each conn</text>
<path d="M690,286 L632,286" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M465,286 L422,286" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<text x="449.5" y="280.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">send() EAGAIN</text>
<text x="449.5" y="280.0" font-size="11" fill="#555" text-anchor="middle">send() EAGAIN</text>
<path d="M470,322 L175,358" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<text x="362.5" y="328.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">full: arm EPOLLOUT</text>
<text x="362.5" y="328.0" font-size="11" fill="#b8650a" text-anchor="middle">full: arm EPOLLOUT</text>
<path d="M232,382 L688,322" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<text x="520.0" y="368.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">EPOLLOUT wakeup</text>
<text x="520.0" y="368.0" font-size="11" fill="#b8650a" text-anchor="middle">EPOLLOUT wakeup</text>
<text x="235" y="415" font-size="10" fill="#555555" text-anchor="start">level-triggered: EPOLLIN always armed; EPOLLOUT armed only while outbuf is non-empty</text>
</svg>