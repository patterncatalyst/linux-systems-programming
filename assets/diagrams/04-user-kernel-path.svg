<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 430" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="20" y="20" width="920" height="210" rx="12" fill="#eef4fb" stroke="#ddd"/>
<text x="32" y="40" font-size="12" font-weight="700" fill="#1d1d1d">user space (ring 3)</text>
<rect x="20" y="250" width="920" height="150" rx="12" fill="#f4f4f4" stroke="#ddd"/>
<text x="32" y="270" font-size="12" font-weight="700" fill="#1d1d1d">kernel (ring 0)</text>
<rect x="40" y="60" width="190" height="70" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="135.0" y="93.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">your code</text>
<text x="135.0" y="110.0" font-size="11.5" fill="#555555" text-anchor="middle">getrandom(buf, 16, 0)</text>
<rect x="280" y="60" width="210" height="70" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="385.0" y="85.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">language wrapper</text>
<text x="385.0" y="102.5" font-size="11.5" fill="#555555" text-anchor="middle">glibc / x/sys / rustix</text>
<text x="385.0" y="117.5" font-size="11.5" fill="#555555" text-anchor="middle">marshal args, decode -errno</text>
<rect x="540" y="60" width="170" height="70" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="625.0" y="85.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">syscall instruction</text>
<text x="625.0" y="102.5" font-size="11.5" fill="#555555" text-anchor="middle">rax=318, args in</text>
<text x="625.0" y="117.5" font-size="11.5" fill="#555555" text-anchor="middle">rdi rsi rdx r10 r8 r9</text>
<rect x="760" y="60" width="160" height="70" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="840.0" y="85.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">[vdso] page</text>
<text x="840.0" y="102.5" font-size="11.5" fill="#555555" text-anchor="middle">clock_gettime,</text>
<text x="840.0" y="117.5" font-size="11.5" fill="#555555" text-anchor="middle">vgetrandom: no trap</text>
<rect x="540" y="285" width="170" height="60" rx="9" fill="#111111" stroke="#111111" stroke-width="2"/>
<text x="625.0" y="313.0" font-size="13.5" font-weight="700" fill="#ffffff" text-anchor="middle">entry_SYSCALL_64</text>
<text x="625.0" y="330.0" font-size="11.5" fill="#dddddd" text-anchor="middle">swap to kernel stack</text>
<rect x="280" y="285" width="210" height="60" rx="9" fill="#f4f4f4" stroke="#888888" stroke-width="1.5"/>
<text x="385.0" y="313.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">sys_call_table[rax]</text>
<text x="385.0" y="330.0" font-size="11.5" fill="#555555" text-anchor="middle">dispatch by number</text>
<rect x="40" y="285" width="190" height="60" rx="9" fill="#f4f4f4" stroke="#888888" stroke-width="1.5"/>
<text x="135.0" y="313.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">sys_getrandom()</text>
<text x="135.0" y="330.0" font-size="11.5" fill="#555555" text-anchor="middle">fills your buffer</text>
<path d="M230,95 L280,95" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M490,95 L540,95" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M490,75 L760,75" fill="none" stroke="#b8650a" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#am)"/>
<text x="631.0" y="67.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">fast path: stays in user space</text>
<text x="631.0" y="67.0" font-size="11" fill="#b8650a" text-anchor="middle">fast path: stays in user space</text>
<path d="M625,130 L625,285" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<text x="645.0" y="201.5" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">trap</text>
<text x="645.0" y="201.5" font-size="11" fill="#b8650a" text-anchor="middle">trap</text>
<path d="M540,315 L490,315" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M280,315 L230,315" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M135,285 L135,130" fill="none" stroke="#555" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#a)"/>
<text x="143.0" y="147.5" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">return: rax = result or -errno</text>
<text x="143.0" y="147.5" font-size="11" fill="#555" text-anchor="middle">return: rax = result or -errno</text>
<text x="40" y="190" font-size="11" fill="#555555" text-anchor="start">one round trip per trap: mode switch + kernel work + mode switch back</text>
<text x="40" y="208" font-size="11" fill="#b8650a" text-anchor="start">strace sits on this boundary - it sees every trap, and nothing the vDSO answers</text>
</svg>