<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 392" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="20" y="44" width="860" height="92" rx="12" fill="#fbeeee" stroke="#ddd"/>
<text x="32" y="64" font-size="12" font-weight="700" fill="#1d1d1d">sequential consistency — strongest; Go&#x27;s only setting</text>
<rect x="20" y="152" width="860" height="92" rx="12" fill="#eef4fb" stroke="#ddd"/>
<text x="32" y="172" font-size="12" font-weight="700" fill="#1d1d1d">acquire / release — pairwise publish; C++ &amp; Rust head/tail</text>
<rect x="20" y="260" width="860" height="92" rx="12" fill="#eef7ef" stroke="#ddd"/>
<text x="32" y="280" font-size="12" font-weight="700" fill="#1d1d1d">relaxed — atomicity only, no ordering; Rust ring slots</text>
<rect x="40" y="74" width="360" height="50" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="220.0" y="97.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">one total order over all seq_cst ops</text>
<text x="220.0" y="114.0" font-size="11.5" fill="#555555" text-anchor="middle">tail.Store(t) in Go</text>
<rect x="470" y="74" width="380" height="50" rx="9" fill="#111111" stroke="#111111" stroke-width="2"/>
<text x="660.0" y="97.0" font-size="13.5" font-weight="700" fill="#ffffff" text-anchor="middle">x86: XCHGQ  (implicitly locked, full fence)</text>
<text x="660.0" y="114.0" font-size="11.5" fill="#dddddd" text-anchor="middle">the store pays for global order</text>
<rect x="40" y="182" width="360" height="50" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="220.0" y="205.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Release store -&gt; Acquire load edge</text>
<text x="220.0" y="222.0" font-size="11.5" fill="#555555" text-anchor="middle">tail.store(...,Release) / .load(Acquire)</text>
<rect x="470" y="182" width="380" height="50" rx="9" fill="#111111" stroke="#111111" stroke-width="2"/>
<text x="660.0" y="205.0" font-size="13.5" font-weight="700" fill="#ffffff" text-anchor="middle">x86: plain MOV  (no lock, no fence)</text>
<text x="660.0" y="222.0" font-size="11.5" fill="#dddddd" text-anchor="middle">TSO already orders store-&gt;store, load-&gt;load</text>
<rect x="40" y="290" width="360" height="50" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="220.0" y="313.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">no cross-thread ordering promise</text>
<text x="220.0" y="330.0" font-size="11.5" fill="#555555" text-anchor="middle">buf[t%K].store(v, Relaxed)</text>
<rect x="470" y="290" width="380" height="50" rx="9" fill="#111111" stroke="#111111" stroke-width="2"/>
<text x="660.0" y="313.0" font-size="13.5" font-weight="700" fill="#ffffff" text-anchor="middle">x86: plain MOV  (same instruction as release)</text>
<text x="660.0" y="330.0" font-size="11.5" fill="#dddddd" text-anchor="middle">safe here only because tail&#x27;s edge covers it</text>
<path d="M400,99 L470,99" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<text x="441.0" y="93.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">compiles to</text>
<text x="441.0" y="93.0" font-size="11" fill="#555" text-anchor="middle">compiles to</text>
<path d="M400,207 L470,207" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<text x="441.0" y="201.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">compiles to</text>
<text x="441.0" y="201.0" font-size="11" fill="#555" text-anchor="middle">compiles to</text>
<path d="M400,315 L470,315" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<text x="441.0" y="309.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">compiles to</text>
<text x="441.0" y="309.0" font-size="11" fill="#555" text-anchor="middle">compiles to</text>
<text x="40" y="372" font-size="11" fill="#555555" text-anchor="start">On x86 the ordering is nearly free — the difference is the promise, not the instruction. On ARM/POWER the movs would need real barriers.</text>
</svg>