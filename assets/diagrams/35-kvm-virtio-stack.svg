<text x="786.0" y="409.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">vmenter</text>
<text x="786.0" y="409.0" font-size="11" fill="#b8650a" text-anchor="middle">vmenter</text>
<text x="480" y="165" font-size="11" fill="#b8650a" text-anchor="middle" font-weight="700">VMX root &lt;-&gt; non-root boundary</text>
