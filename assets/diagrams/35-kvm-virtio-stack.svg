<text x="536.0" y="239.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">block req</text>
<text x="536.0" y="239.0" font-size="11" fill="#555" text-anchor="middle">block req</text>
<path d="M750,245 L790,245" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<text x="776.0" y="239.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">enqueue</text>
<text x="776.0" y="239.0" font-size="11" fill="#555" text-anchor="middle">enqueue</text>
<path d="M250,415 L300,415" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<text x="281.0" y="409.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">vmexit</text>
<text x="281.0" y="409.0" font-size="11" fill="#b8650a" text-anchor="middle">vmexit</text>
