<text x="470" y="20" font-size="11" fill="#1d1d1d" text-anchor="middle" font-weight="700">Figure 33.1 — a syscall&#x27;s path through fwatch&#x27;s seccomp-bpf filter</text>
<text x="30" y="420" font-size="11" fill="#1d1d1d" text-anchor="start">Real: cpp/rust filters admit 26 syscalls, go&#x27;s 39 (goroutine scheduler needs futex/clone/sigaltstack too).</text>
<text x="30" y="440" font-size="11" fill="#1d1d1d" text-anchor="start">Guest (systems-target, kernel 6.19.10): socket(AF_INET,...) = -1 EPERM under fwatch&#x27;s filter; a separate ACT_KILL_PROCESS probe on the same guest hit SIGSYS on getpid().</text>
