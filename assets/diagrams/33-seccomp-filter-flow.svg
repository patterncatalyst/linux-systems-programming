<rect x="20" y="30" width="900" height="90" rx="12" fill="#eef4fb" stroke="#ddd"/>
<text x="32" y="50" font-size="12" font-weight="700" fill="#1d1d1d">userspace: fwatch watch loop</text>
<rect x="20" y="140" width="900" height="200" rx="12" fill="#fafafa" stroke="#ddd"/>
<text x="32" y="160" font-size="12" font-weight="700" fill="#1d1d1d">kernel: seccomp-bpf filter — one cBPF program, RUN AGAIN on every syscall entry</text>
<rect x="50" y="65" width="380" height="45" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="240.0" y="85.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">syscall(2) issued</text>
<text x="240.0" y="102.5" font-size="11.5" fill="#555555" text-anchor="middle">e.g. epoll_wait, read, socket</text>
<rect x="500" y="65" width="400" height="45" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="700.0" y="85.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">this IS classic BPF (cBPF)</text>
<text x="700.0" y="102.5" font-size="11.5" fill="#555555" text-anchor="middle">you write the filter — Part 8&#x27;s bpftrace observes; this decides</text>
<rect x="50" y="175" width="230" height="55" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5"/>
<text x="165.0" y="200.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">BPF_LD|BPF_W|BPF_ABS</text>
<text x="165.0" y="217.5" font-size="11.5" fill="#555555" text-anchor="middle">load nr + arch offset</text>
<rect x="310" y="175" width="300" height="55" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="460.0" y="200.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">jump table: nr == read? epoll_wait? …</text>
<text x="460.0" y="217.5" font-size="11.5" fill="#555555" text-anchor="middle">26 entries (cpp/rust) · 39 (go)</text>
<rect x="650" y="175" width="240" height="55" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="770.0" y="200.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">match → SECCOMP_RET_ALLOW</text>
<text x="770.0" y="217.5" font-size="11.5" fill="#555555" text-anchor="middle">syscall actually runs</text>
<rect x="310" y="260" width="300" height="50" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5"/>
<text x="460.0" y="283.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">no match → default action</text>
<text x="460.0" y="300.0" font-size="11.5" fill="#555555" text-anchor="middle">(seccomp_init&#x27;s action arg)</text>
<rect x="60" y="340" width="380" height="55" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="250.0" y="365.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">SCMP_ACT_ERRNO(EPERM) — fwatch&#x27;s choice</text>
<text x="250.0" y="382.5" font-size="11.5" fill="#555555" text-anchor="middle">socket(2) = -1 EPERM; process keeps running</text>
<rect x="500" y="340" width="380" height="55" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="690.0" y="365.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">SCMP_ACT_KILL_PROCESS — not used by fwatch</text>
<text x="690.0" y="382.5" font-size="11.5" fill="#555555" text-anchor="middle">getpid() denied → +++ killed by SIGSYS +++</text>
