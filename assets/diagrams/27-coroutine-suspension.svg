<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 430" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="20" y="40" width="900" height="130" rx="12" fill="#eef4fb" stroke="#ddd"/>
<text x="32" y="60" font-size="12" font-weight="700" fill="#1d1d1d">user — connection() coroutine (one heap-allocated frame per client)</text>
<rect x="20" y="195" width="900" height="95" rx="12" fill="#fafafa" stroke="#ddd"/>
<text x="32" y="215" font-size="12" font-weight="700" fill="#1d1d1d">the single OS thread — Reactor::run()</text>
<rect x="20" y="315" width="900" height="90" rx="12" fill="#f4f4f4" stroke="#ddd"/>
<text x="32" y="335" font-size="12" font-weight="700" fill="#1d1d1d">kernel — epoll interest list</text>
<rect x="45" y="78" width="180" height="66" rx="9" fill="#ffffff" stroke="#111111" stroke-width="1.5"/>
<text x="135.0" y="109.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">1  co_await fill()</text>
<text x="135.0" y="126.0" font-size="11.5" fill="#555555" text-anchor="middle">recv() → EAGAIN</text>
<rect x="258" y="78" width="190" height="66" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="353.0" y="109.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">2  co_await ReadAwaitable</text>
<text x="353.0" y="126.0" font-size="11.5" fill="#555555" text-anchor="middle">await_suspend(h)</text>
<rect x="482" y="78" width="170" height="66" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="567.0" y="109.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">3  frame suspended</text>
<text x="567.0" y="126.0" font-size="11.5" fill="#555555" text-anchor="middle">control returns down</text>
<rect x="700" y="78" width="195" height="66" rx="9" fill="#ffffff" stroke="#111111" stroke-width="1.5"/>
<text x="797.5" y="109.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">6  h.resume()</text>
<text x="797.5" y="126.0" font-size="11.5" fill="#555555" text-anchor="middle">recv() → bytes, decode</text>
<rect x="258" y="218" width="190" height="56" rx="9" fill="#ffffff" stroke="#111111" stroke-width="1.5"/>
<text x="353.0" y="244.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">wait_readable(fd, h)</text>
<text x="353.0" y="261.0" font-size="11.5" fill="#555555" text-anchor="middle">waiters_[fd]=h; arm fd</text>
<rect x="610" y="218" width="190" height="56" rx="9" fill="#ffffff" stroke="#111111" stroke-width="1.5"/>
<text x="705.0" y="244.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">epoll_wait(-1)</text>
<text x="705.0" y="261.0" font-size="11.5" fill="#555555" text-anchor="middle">resume the parked handle</text>
<rect x="340" y="335" width="270" height="52" rx="9" fill="#ffffff" stroke="#111111" stroke-width="1.5"/>
<text x="475.0" y="359.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">EPOLLIN | EPOLLONESHOT on fd</text>
<text x="475.0" y="376.0" font-size="11.5" fill="#555555" text-anchor="middle">ready → events[i].data.fd</text>
<path d="M225,111 L258,111" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<text x="247.5" y="101.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">EAGAIN</text>
<text x="247.5" y="101.0" font-size="11" fill="#555" text-anchor="middle">EAGAIN</text>
<path d="M353,144 L353,218" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<text x="379.0" y="159.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">suspend</text>
<text x="379.0" y="159.0" font-size="11" fill="#b8650a" text-anchor="middle">suspend</text>
<path d="M353,274 L420,335" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<text x="378.5" y="298.5" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">epoll_ctl</text>
<text x="378.5" y="298.5" font-size="11" fill="#555" text-anchor="middle">epoll_ctl</text>
<path d="M585,361 L690,274" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<text x="655.5" y="311.5" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">ready</text>
<text x="655.5" y="311.5" font-size="11" fill="#b8650a" text-anchor="middle">ready</text>
<path d="M720,218 L790,144" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<text x="777.0" y="175.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">resume</text>
<text x="777.0" y="175.0" font-size="11" fill="#b8650a" text-anchor="middle">resume</text>
<text x="700" y="168" font-size="10" fill="#555555" text-anchor="start">each decoded frame loops back to step 1 (co_await fill)</text>
<text x="40" y="175" font-size="10" fill="#2f6db5" text-anchor="start">suspension is a return, not a blocked thread: the frame outlives the call stack</text>
</svg>