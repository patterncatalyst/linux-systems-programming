<text x="40" y="470" font-size="12" fill="#1d1d1d" text-anchor="start">Amber boxes are the CPU-profiling step this chapter cross-checks against each other: perf report / go tool pprof / perf report (or cargo flamegraph), all naming the same function.</text>
