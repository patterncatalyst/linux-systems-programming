<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="20" y="40" width="960" height="220" rx="12" fill="#fdf6f6" stroke="#ddd"/>
<text x="32" y="60" font-size="12" font-weight="700" fill="#1d1d1d">supervising by pid number — five steps to signalling a stranger</text>
<rect x="20" y="300" width="960" height="200" rx="12" fill="#f4f9f4" stroke="#ddd"/>
<text x="32" y="320" font-size="12" font-weight="700" fill="#1d1d1d">supervising by pidfd — the fd pins the identity</text>
<rect x="40" y="80" width="170" height="72" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="125.0" y="106.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">1  spawn</text>
<text x="125.0" y="123.5" font-size="11.5" fill="#555555" text-anchor="middle">remember pid 4242</text>
<text x="125.0" y="138.5" font-size="11.5" fill="#555555" text-anchor="middle">(an integer, nothing more)</text>
<rect x="232" y="80" width="170" height="72" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="317.0" y="106.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">2  child crashes</text>
<text x="317.0" y="123.5" font-size="11.5" fill="#555555" text-anchor="middle">zombie: pid still</text>
<text x="317.0" y="138.5" font-size="11.5" fill="#555555" text-anchor="middle">reserved, status pending</text>
<rect x="424" y="80" width="180" height="72" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="514.0" y="106.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">3  reaped elsewhere</text>
<text x="514.0" y="123.5" font-size="11.5" fill="#555555" text-anchor="middle">a wait() collects it —</text>
<text x="514.0" y="138.5" font-size="11.5" fill="#555555" text-anchor="middle">pid 4242 is now free</text>
<rect x="626" y="80" width="170" height="72" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="711.0" y="106.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">4  kernel recycles</text>
<text x="711.0" y="123.5" font-size="11.5" fill="#555555" text-anchor="middle">pid 4242 = someone</text>
<text x="711.0" y="138.5" font-size="11.5" fill="#555555" text-anchor="middle">else&#x27;s new process</text>
<rect x="818" y="80" width="150" height="72" rx="9" fill="#111111" stroke="#111111" stroke-width="2"/>
<text x="893.0" y="106.5" font-size="13.5" font-weight="700" fill="#ffffff" text-anchor="middle">5  kill(4242, TERM)</text>
<text x="893.0" y="123.5" font-size="11.5" fill="#dddddd" text-anchor="middle">delivered to</text>
<text x="893.0" y="138.5" font-size="11.5" fill="#dddddd" text-anchor="middle">the stranger</text>
<rect x="40" y="344" width="200" height="72" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="140.0" y="370.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">1  spawn + pidfd_open</text>
<text x="140.0" y="387.5" font-size="11.5" fill="#555555" text-anchor="middle">child 4242 -&gt; pidfd 4</text>
<text x="140.0" y="402.5" font-size="11.5" fill="#555555" text-anchor="middle">fd refers to the process</text>
<rect x="286" y="344" width="200" height="72" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="386.0" y="370.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">2  child exits</text>
<text x="386.0" y="387.5" font-size="11.5" fill="#555555" text-anchor="middle">pidfd 4 turns readable —</text>
<text x="386.0" y="402.5" font-size="11.5" fill="#555555" text-anchor="middle">poll/epoll sees POLLIN</text>
<rect x="532" y="344" width="200" height="72" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="632.0" y="370.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">3  waitid(P_PIDFD, 4)</text>
<text x="632.0" y="387.5" font-size="11.5" fill="#555555" text-anchor="middle">reaps exactly the process</text>
<text x="632.0" y="402.5" font-size="11.5" fill="#555555" text-anchor="middle">behind the fd</text>
<rect x="778" y="344" width="190" height="72" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="873.0" y="370.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">4  pidfd_send_signal(4)</text>
<text x="873.0" y="387.5" font-size="11.5" fill="#555555" text-anchor="middle">after exit: ESRCH —</text>
<text x="873.0" y="402.5" font-size="11.5" fill="#555555" text-anchor="middle">never a recycled pid</text>
<path d="M210,116 L230,116" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M402,116 L422,116" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M604,116 L624,116" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M796,116 L816,116" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<path d="M893,152 L711,210" fill="none" stroke="#b8650a" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#am)"/>
<text x="808.0" y="195.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">same integer, different process</text>
<text x="808.0" y="195.0" font-size="11" fill="#b8650a" text-anchor="middle">same integer, different process</text>
<path d="M240,380 L284,380" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<text x="268.0" y="372.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">poll</text>
<text x="268.0" y="372.0" font-size="11" fill="#555" text-anchor="middle">poll</text>
<path d="M486,380 L530,380" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<text x="514.0" y="372.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">readable</text>
<text x="514.0" y="372.0" font-size="11" fill="#555" text-anchor="middle">readable</text>
<path d="M732,380 L776,380" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<text x="40" y="235" font-size="11" fill="#8a3b3b" text-anchor="start">The window 3-&gt;5 can be microseconds or hours; nothing the supervisor holds distinguishes old 4242 from new 4242.</text>
<text x="40" y="448" font-size="11" fill="#3b6a3b" text-anchor="start">Real run on this host: /proc/&lt;pmon&gt;/fdinfo/4 reads  Pid: 2624390  — the fd itself names the child;</text>
<text x="40" y="464" font-size="11" fill="#3b6a3b" text-anchor="start">strace: pidfd_open(2624926)=4, poll([pidfd,signalfd]) -&gt; POLLIN, waitid(P_PIDFD,4)=CLD_KILLED, pidfd_send_signal(4,SIGTERM)=0.</text>
<text x="20" y="530" font-size="12" fill="#1d1d1d" text-anchor="start">Steps 1-5 above are the classic pid-reuse race every kill(2)-based supervisor carries; the lower lane is pmon v2&#x27;s default engine.</text>
</svg>