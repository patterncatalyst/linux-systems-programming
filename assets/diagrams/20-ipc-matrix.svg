<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 360" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="20" y="20" width="900" height="300" rx="12" fill="#fafafa" stroke="#ddd"/>
<text x="32" y="40" font-size="12" font-weight="700" fill="#1d1d1d">one-way notification latency, 8-byte payload, 2000 serialized rounds (this host)</text>
<rect x="40" y="70" width="130" height="88" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="105.0" y="97.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">futex wake</text>
<text x="105.0" y="114.0" font-size="11.5" fill="#555555" text-anchor="middle">p50 &lt;1 us</text>
<text x="105.0" y="129.0" font-size="11.5" fill="#555555" text-anchor="middle">p99 4 us</text>
<text x="105.0" y="144.0" font-size="11.5" fill="#555555" text-anchor="middle">0-2 syscalls/round</text>
<rect x="190" y="70" width="130" height="88" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="255.0" y="97.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">eventfd</text>
<text x="255.0" y="114.0" font-size="11.5" fill="#555555" text-anchor="middle">p50 2 us</text>
<text x="255.0" y="129.0" font-size="11.5" fill="#555555" text-anchor="middle">p99 6 us</text>
<text x="255.0" y="144.0" font-size="11.5" fill="#555555" text-anchor="middle">fd: inherit or pass</text>
<rect x="340" y="70" width="130" height="88" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="405.0" y="97.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">pipe</text>
<text x="405.0" y="114.0" font-size="11.5" fill="#555555" text-anchor="middle">p50 2 us</text>
<text x="405.0" y="129.0" font-size="11.5" fill="#555555" text-anchor="middle">p99 5 us</text>
<text x="405.0" y="144.0" font-size="11.5" fill="#555555" text-anchor="middle">ch. 18 channel</text>
<rect x="490" y="70" width="130" height="88" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="555.0" y="97.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">POSIX mq</text>
<text x="555.0" y="114.0" font-size="11.5" fill="#555555" text-anchor="middle">p50 2 us</text>
<text x="555.0" y="129.0" font-size="11.5" fill="#555555" text-anchor="middle">p99 14 us</text>
<text x="555.0" y="144.0" font-size="11.5" fill="#555555" text-anchor="middle">named, priorities</text>
<rect x="640" y="70" width="130" height="88" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="705.0" y="97.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">UNIX socket</text>
<text x="705.0" y="114.0" font-size="11.5" fill="#555555" text-anchor="middle">p50 3 us</text>
<text x="705.0" y="129.0" font-size="11.5" fill="#555555" text-anchor="middle">p99 12 us</text>
<text x="705.0" y="144.0" font-size="11.5" fill="#555555" text-anchor="middle">ch. 19 channel</text>
<rect x="790" y="70" width="130" height="88" rx="9" fill="#111111" stroke="#111111" stroke-width="2"/>
<text x="855.0" y="97.0" font-size="13.5" font-weight="700" fill="#ffffff" text-anchor="middle">1 ms poll loop</text>
<text x="855.0" y="114.0" font-size="11.5" fill="#dddddd" text-anchor="middle">p50 1056 us</text>
<text x="855.0" y="129.0" font-size="11.5" fill="#dddddd" text-anchor="middle">p99 1083 us</text>
<text x="855.0" y="144.0" font-size="11.5" fill="#dddddd" text-anchor="middle">no kernel help</text>
<rect x="40" y="200" width="430" height="88" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5"/>
<text x="255.0" y="234.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">scheduler evidence (4 s window)</text>
<text x="255.0" y="251.5" font-size="11.5" fill="#555555" text-anchor="middle">futex watcher: 8 voluntary ctxt switches</text>
<text x="255.0" y="266.5" font-size="11.5" fill="#555555" text-anchor="middle">poll consumer: 3774 voluntary ctxt switches</text>
<rect x="490" y="200" width="430" height="88" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5"/>
<text x="705.0" y="234.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">rusage, 2000 rounds</text>
<text x="705.0" y="251.5" font-size="11.5" fill="#555555" text-anchor="middle">futex: 120 voluntary switches (fast path skips the sleep)</text>
<text x="705.0" y="266.5" font-size="11.5" fill="#555555" text-anchor="middle">poll: 2002 - one nap per round, by construction</text>
<path d="M170,114 L190,114" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M320,114 L340,114" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M470,114 L490,114" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M620,114 L640,114" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M770,114 L790,114" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<text x="786.0" y="106.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">~350x</text>
<text x="786.0" y="106.0" font-size="11" fill="#b8650a" text-anchor="middle">~350x</text>
<text x="40" y="185" font-size="11.5" fill="#1d1d1d" text-anchor="start">Latency climbs left to right; every measured channel except the poll loop lands within one order of magnitude.</text>
<text x="40" y="345" font-size="11.5" fill="#1d1d1d" text-anchor="start" font-weight="700">Numbers are plainly bounded by this host (idle 8-core/16-thread Fedora 44 box); rankings, not absolutes, are the takeaway.</text>
</svg>