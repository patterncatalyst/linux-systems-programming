<text x="50" y="235" font-size="11" fill="#1d1d1d" text-anchor="start">Left: the local path this chapter&#x27;s evidence is built on -- app crashes, systemd-coredump</text>
<text x="50" y="250" font-size="11" fill="#1d1d1d" text-anchor="start">catches it, coredumpctl extracts core.app, gdb opens the core file directly.</text>
<text x="590" y="235" font-size="11" fill="#1d1d1d" text-anchor="start">Right: the remote path -- gdbserver attaches on the VM, the host&#x27;s gdb drives it over</text>
<text x="590" y="250" font-size="11" fill="#1d1d1d" text-anchor="start">TCP with &#x27;target remote&#x27;. No systems-target VM was up this session; not run here.</text>
<text x="590" y="500" font-size="10.5" fill="#666666" text-anchor="start">gdbserver is preinstalled on the lab VM image (not on this host).</text>
