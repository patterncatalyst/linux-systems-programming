<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 430" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="20" y="40" width="900" height="125" rx="12" fill="#eef4fb" stroke="#ddd"/>
<text x="32" y="60" font-size="12" font-weight="700" fill="#1d1d1d">tokio tasks — async fn per connection (compiled to a state machine, not a thread)</text>
<rect x="20" y="190" width="900" height="100" rx="12" fill="#fafafa" stroke="#ddd"/>
<text x="32" y="210" font-size="12" font-weight="700" fill="#1d1d1d">16 tokio-rt-worker threads (= cores) — work-stealing schedulers</text>
<rect x="20" y="315" width="900" height="90" rx="12" fill="#f4f4f4" stroke="#ddd"/>
<text x="32" y="335" font-size="12" font-weight="700" fill="#1d1d1d">mio reactor — one epoll instance</text>
<rect x="45" y="74" width="160" height="62" rx="9" fill="#ffffff" stroke="#111111" stroke-width="1.5"/>
<text x="125.0" y="103.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">tokio::spawn</text>
<text x="125.0" y="120.0" font-size="11.5" fill="#555555" text-anchor="middle">handle_conn(...)</text>
<rect x="245" y="74" width="170" height="62" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="330.0" y="103.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">.await → poll(cx)</text>
<text x="330.0" y="120.0" font-size="11.5" fill="#555555" text-anchor="middle">Poll::Pending</text>
<rect x="455" y="74" width="170" height="62" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="540.0" y="103.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">task parked</text>
<text x="540.0" y="120.0" font-size="11.5" fill="#555555" text-anchor="middle">Waker held by reactor</text>
<rect x="700" y="74" width="190" height="62" rx="9" fill="#ffffff" stroke="#111111" stroke-width="1.5"/>
<text x="795.0" y="103.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">poll(cx) again</text>
<text x="795.0" y="120.0" font-size="11.5" fill="#555555" text-anchor="middle">Poll::Ready → frame sent</text>
<rect x="245" y="210" width="180" height="58" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="335.0" y="237.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">worker thread</text>
<text x="335.0" y="254.0" font-size="11.5" fill="#555555" text-anchor="middle">drives poll(); cx carries Waker</text>
<rect x="470" y="210" width="200" height="58" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="570.0" y="237.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">run queue</text>
<text x="570.0" y="254.0" font-size="11.5" fill="#555555" text-anchor="middle">Waker::wake() re-enqueues task</text>
<rect x="420" y="335" width="300" height="52" rx="9" fill="#ffffff" stroke="#111111" stroke-width="1.5"/>
<text x="570.0" y="359.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">epoll_wait — fd readable</text>
<text x="570.0" y="376.0" font-size="11.5" fill="#555555" text-anchor="middle">calls the registered Waker</text>
<path d="M125,136 L335,210" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<text x="224.0" y="167.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">schedule</text>
<text x="224.0" y="167.0" font-size="11" fill="#555" text-anchor="middle">schedule</text>
<path d="M330,136 L330,210" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<text x="350.0" y="167.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">poll</text>
<text x="350.0" y="167.0" font-size="11" fill="#b8650a" text-anchor="middle">poll</text>
<path d="M425,105 L455,105" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<text x="446.0" y="99.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">pending</text>
<text x="446.0" y="99.0" font-size="11" fill="#555" text-anchor="middle">pending</text>
<path d="M468,136 L460,335" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<text x="406.0" y="275.5" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">register Waker+fd</text>
<text x="406.0" y="275.5" font-size="11" fill="#555" text-anchor="middle">register Waker+fd</text>
<path d="M700,335 L655,268" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<text x="707.5" y="295.5" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">wake()</text>
<text x="707.5" y="295.5" font-size="11" fill="#b8650a" text-anchor="middle">wake()</text>
<path d="M625,210 L760,136" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<text x="712.5" y="167.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">re-poll</text>
<text x="712.5" y="167.0" font-size="11" fill="#b8650a" text-anchor="middle">re-poll</text>
<text x="40" y="300" font-size="10" fill="#2f6db5" text-anchor="start">a task is a heap object the size of its locals — 20k tasks share 16 threads; a Waker is the callback that says &#x27;poll me again&#x27;</text>
</svg>