<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 620" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="30" y="40" width="1120" height="430" rx="12" fill="#fafafa" stroke="#ddd"/>
<text x="42" y="60" font-size="12" font-weight="700" fill="#1d1d1d">one flamegraph: each box is a stack frame sampled by perf</text>
<rect x="30" y="480" width="230" height="56" rx="9" fill="#111111" stroke="#111111" stroke-width="2"/>
<text x="145.0" y="506.0" font-size="13.5" font-weight="700" fill="#ffffff" text-anchor="middle">y = stack depth</text>
<text x="145.0" y="523.0" font-size="11.5" fill="#dddddd" text-anchor="middle">bottom: root  top: leaf (running now)</text>
<rect x="300" y="480" width="230" height="56" rx="9" fill="#111111" stroke="#111111" stroke-width="2"/>
<text x="415.0" y="506.0" font-size="13.5" font-weight="700" fill="#ffffff" text-anchor="middle">x = share of samples</text>
<text x="415.0" y="523.0" font-size="11.5" fill="#dddddd" text-anchor="middle">NOT time order or call order</text>
<rect x="570" y="480" width="290" height="56" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="715.0" y="506.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">widest box = the hot function</text>
<text x="715.0" y="523.0" font-size="11.5" fill="#555555" text-anchor="middle">spin_hot / hotSpin at ~99% of samples</text>
<rect x="900" y="480" width="250" height="56" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5"/>
<text x="1025.0" y="506.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">color here = which language tab</text>
<text x="1025.0" y="523.0" font-size="11.5" fill="#555555" text-anchor="middle">real tools often color per-module or random</text>
<rect x="40" y="400" width="1100" height="50" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="590.0" y="430.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">_start / runtime.main  (100% — every sample passes through here)</text>
<rect x="40" y="340" width="1080" height="50" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5"/>
<text x="580.0" y="370.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">main / main.run  (99.9%)</text>
<rect x="40" y="280" width="18" height="50" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="49.0" y="310.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle"></text>
<rect x="70" y="280" width="1030" height="50" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="585.0" y="310.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">spin_hot / hotSpin  (99.2% — the wide box IS the hot path)</text>
<rect x="70" y="220" width="1030" height="50" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="585.0" y="250.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">inner divisor loop (i % d == 0)  — inlined, same width as its caller</text>
<rect x="70" y="160" width="140" height="50" rx="9" fill="#111111" stroke="#111111" stroke-width="2"/>
<text x="140.0" y="190.5" font-size="13.5" font-weight="700" fill="#ffffff" text-anchor="middle">leaf @ sample tick</text>
<rect x="230" y="160" width="870" height="50" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5"/>
<text x="665.0" y="190.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">(rest of spin_hot&#x27;s samples, other instants — same function, same box below)</text>
<path d="M155,156 L155,100" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<text x="655.0" y="218.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">read UP one column: this is the call stack open at that instant</text>
<text x="655.0" y="218.0" font-size="11" fill="#b8650a" text-anchor="middle">read UP one column: this is the call stack open at that instant</text>
<text x="590" y="25" font-size="15" fill="#b8650a" text-anchor="middle" font-weight="700">Figure 31.1 — reading a flamegraph</text>
<text x="40" y="596" font-size="12" fill="#1d1d1d" text-anchor="start">Finding the hot path: scan for the widest unbroken column reaching toward the top — that name is where the cycles go.</text>
</svg>