<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 660" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b8650a"/></marker></defs>
<rect x="20" y="20" width="960" height="150" rx="12" fill="#fafafa" stroke="#ddd"/>
<text x="32" y="40" font-size="12" font-weight="700" fill="#1d1d1d">three uids, one state machine — setresuid(65534, 65534, 65534) moves all three at once</text>
<rect x="20" y="190" width="960" height="450" rx="12" fill="#fafafa" stroke="#ddd"/>
<text x="32" y="210" font-size="12" font-weight="700" fill="#1d1d1d">capability sets across pmon drop --user nobody --keep-cap net_bind_service (values from /proc/&lt;pid&gt;/status on systems-target)</text>
<rect x="60" y="60" width="240" height="78" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="180.0" y="89.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">real uid</text>
<text x="180.0" y="106.5" font-size="11.5" fill="#555555" text-anchor="middle">0 → 65534</text>
<text x="180.0" y="121.5" font-size="11.5" fill="#555555" text-anchor="middle">who you are (signals, accounting)</text>
<rect x="380" y="60" width="240" height="78" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="500.0" y="89.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">effective uid</text>
<text x="500.0" y="106.5" font-size="11.5" fill="#555555" text-anchor="middle">0 → 65534</text>
<text x="500.0" y="121.5" font-size="11.5" fill="#555555" text-anchor="middle">the one permission checks read</text>
<rect x="700" y="60" width="240" height="78" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="820.0" y="89.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">saved uid</text>
<text x="820.0" y="106.5" font-size="11.5" fill="#555555" text-anchor="middle">0 → 65534</text>
<text x="820.0" y="121.5" font-size="11.5" fill="#555555" text-anchor="middle">the way back — gone after the drop</text>
<rect x="40" y="240" width="140" height="96" rx="9" fill="#eef4fb" stroke="#2f6db5" stroke-width="2"/>
<text x="110.0" y="271.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">pmon (root)</text>
<text x="110.0" y="288.0" font-size="11.5" fill="#555555" text-anchor="middle">uid r/e/s = 0/0/0</text>
<text x="110.0" y="303.0" font-size="11.5" fill="#555555" text-anchor="middle">Prm=Eff=1ffffffffff</text>
<text x="110.0" y="318.0" font-size="11.5" fill="#555555" text-anchor="middle">Amb=0</text>
<rect x="200" y="240" width="140" height="96" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="270.0" y="271.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">prctl</text>
<text x="270.0" y="288.0" font-size="11.5" fill="#555555" text-anchor="middle">PR_SET_KEEPCAPS</text>
<text x="270.0" y="303.0" font-size="11.5" fill="#555555" text-anchor="middle">before the</text>
<text x="270.0" y="318.0" font-size="11.5" fill="#555555" text-anchor="middle">uid change</text>
<rect x="360" y="240" width="140" height="96" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="430.0" y="271.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">setresuid</text>
<text x="430.0" y="288.0" font-size="11.5" fill="#555555" text-anchor="middle">groups, gid, uid</text>
<text x="430.0" y="303.0" font-size="11.5" fill="#555555" text-anchor="middle">→ 65534</text>
<text x="430.0" y="318.0" font-size="11.5" fill="#555555" text-anchor="middle">permitted kept</text>
<rect x="520" y="240" width="140" height="96" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="590.0" y="271.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">capset</text>
<text x="590.0" y="288.0" font-size="11.5" fill="#555555" text-anchor="middle">Prm=Inh=Eff</text>
<text x="590.0" y="303.0" font-size="11.5" fill="#555555" text-anchor="middle">= 0x400</text>
<text x="590.0" y="318.0" font-size="11.5" fill="#555555" text-anchor="middle">all else dropped</text>
<rect x="680" y="240" width="140" height="96" rx="9" fill="#fff8ef" stroke="#e8870c" stroke-width="2"/>
<text x="750.0" y="271.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">prctl</text>
<text x="750.0" y="288.0" font-size="11.5" fill="#555555" text-anchor="middle">AMBIENT_RAISE</text>
<text x="750.0" y="303.0" font-size="11.5" fill="#555555" text-anchor="middle">Amb = 0x400</text>
<text x="750.0" y="318.0" font-size="11.5" fill="#555555" text-anchor="middle">needs Prm ∩ Inh</text>
<rect x="840" y="240" width="130" height="96" rx="9" fill="#111111" stroke="#111111" stroke-width="2"/>
<text x="905.0" y="271.0" font-size="13.5" font-weight="700" fill="#ffffff" text-anchor="middle">execve</text>
<text x="905.0" y="288.0" font-size="11.5" fill="#dddddd" text-anchor="middle">bindprobe</text>
<text x="905.0" y="303.0" font-size="11.5" fill="#dddddd" text-anchor="middle">uid=65534</text>
<text x="905.0" y="318.0" font-size="11.5" fill="#dddddd" text-anchor="middle">bound :80 · exit 0</text>
<rect x="200" y="420" width="140" height="88" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="270.0" y="454.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">no --keep-cap</text>
<text x="270.0" y="471.5" font-size="11.5" fill="#555555" text-anchor="middle">steps 1, 3, 4</text>
<text x="270.0" y="486.5" font-size="11.5" fill="#555555" text-anchor="middle">never happen</text>
<rect x="360" y="420" width="140" height="88" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="430.0" y="447.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">setresuid</text>
<text x="430.0" y="464.0" font-size="11.5" fill="#555555" text-anchor="middle">uid 0 → 65534</text>
<text x="430.0" y="479.0" font-size="11.5" fill="#555555" text-anchor="middle">permitted</text>
<text x="430.0" y="494.0" font-size="11.5" fill="#555555" text-anchor="middle">scrubbed to 0</text>
<rect x="680" y="420" width="290" height="88" rx="9" fill="#ffffff" stroke="#999999" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="825.0" y="454.5" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">execve → bindprobe</text>
<text x="825.0" y="471.5" font-size="11.5" fill="#555555" text-anchor="middle">every set 0000000000000000</text>
<text x="825.0" y="486.5" font-size="11.5" fill="#555555" text-anchor="middle">bind :80 → Permission denied · exit 3</text>
<path d="M180,288 L200,288" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M340,288 L360,288" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M500,288 L520,288" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M660,288 L680,288" fill="none" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
<path d="M820,288 L840,288" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<path d="M110,336 L200,452" fill="none" stroke="#555" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#a)"/>
<text x="147.0" y="410.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">negative control</text>
<text x="147.0" y="410.0" font-size="11" fill="#555" text-anchor="middle">negative control</text>
<path d="M340,464 L360,464" fill="none" stroke="#555" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#a)"/>
<path d="M500,464 L680,464" fill="none" stroke="#555" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#a)"/>
<text x="596.0" y="456.0" font-size="11" fill="#ffffff" stroke="#ffffff" stroke-width="3" paint-order="stroke" text-anchor="middle">nothing to raise</text>
<text x="596.0" y="456.0" font-size="11" fill="#555" text-anchor="middle">nothing to raise</text>
<text x="60" y="158" font-size="11" fill="#555555" text-anchor="start">seteuid() moves only the middle one; the saved uid is what lets a set-uid binary flip back — pmon sets all three so there is no way back.</text>
<text x="40" y="560" font-size="11" fill="#1d1d1d" text-anchor="start" font-weight="700">child status, kept-cap run:  CapInh = CapPrm = CapEff = CapAmb = 0000000000000400   ·   CapBnd = 000001ffffffffff</text>
<text x="40" y="582" font-size="11" fill="#555555" text-anchor="start">capsh --decode=0000000000000400 → cap_net_bind_service; the bounding set masks what execve may grant — it never grants anything itself.</text>
<text x="40" y="604" font-size="11" fill="#555555" text-anchor="start">negative control: getpcaps prints an empty set and every Cap line but CapBnd reads 0000000000000000.</text>
</svg>